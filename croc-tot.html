<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:#0a0a1a;}
body{font-family:Arial,sans-serif;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;min-height:100dvh;overflow-y:auto;padding:env(safe-area-inset-top,0px) env(safe-area-inset-right,0px) env(safe-area-inset-bottom,0px) env(safe-area-inset-left,0px);}
#wrap{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 4px 8px;width:100%;max-width:640px;}
#canvasWrap{width:100%;position:relative;}
canvas{display:block;width:100%;height:auto;border-radius:10px;border:2px solid rgba(255,255,255,0.18);touch-action:none;-webkit-touch-callout:none;}
#hud{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;width:100%;}
.hb{background:rgba(255,255,255,0.13);border-radius:7px;padding:2px 7px;font-size:11px;color:#fff;font-weight:600;}
.hb b{font-size:13px;}
.bar{width:100%;height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;}
#tf{height:100%;border-radius:3px;background:linear-gradient(90deg,#44aaff,#44ffaa);width:0%;}
#pf{height:100%;border-radius:3px;background:linear-gradient(90deg,#ff6600,#ffee00);width:0%;}
#bw{display:none;width:100%;}
#bi{height:10px;border-radius:5px;background:#44dd44;}
#msg{color:#ffe;font-size:12px;min-height:16px;text-align:center;font-weight:700;text-shadow:0 1px 4px #000;width:100%;}
.btn{padding:8px 20px;font-size:14px;font-weight:700;border-radius:8px;border:none;background:#ff6600;color:#fff;cursor:pointer;margin:2px;-webkit-tap-highlight-color:transparent;}
.btn:active{background:#ff4400;}
#btnRow{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;width:100%;}
#uh{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;min-height:16px;width:100%;}
.upg{background:rgba(255,200,0,0.18);border:1px solid rgba(255,200,0,0.45);border-radius:5px;padding:1px 6px;font-size:11px;color:#ffdd44;font-weight:700;}

/* ── iPhone small ── */
@media(max-width:390px){#wrap{padding:2px 2px 8px;gap:2px;}.hb{font-size:10px;padding:2px 5px;}}

/* ── Landscape on small screens (iPhone landscape, etc.) ── */
@media(max-height:500px){
  body{align-items:flex-start;overflow:hidden;}
  #wrap{padding:1px 2px 1px;gap:0px;height:100dvh;justify-content:flex-start;}
  #hud{gap:2px;}
  .hb{font-size:9px;padding:1px 4px;border-radius:4px;}
  .hb b{font-size:10px;}
  .bar{height:3px;margin:0;}
  #bw{margin:0;}
  #uh{min-height:10px;gap:2px;}
  .upg{font-size:9px;padding:0px 4px;}
  #msg{font-size:10px;min-height:10px;}
  /* Canvas fills remaining height minus small button row */
  #canvasWrap{flex:1;position:relative;min-height:0;display:flex;align-items:center;}
  canvas{width:auto !important;height:100% !important;max-height:calc(100dvh - 80px);display:block;margin:0 auto;}
  /* Buttons: compact row, still visible */
  #btnRow{
    display:flex;justify-content:center;gap:4px;flex-wrap:wrap;
    width:100%;padding:2px 0;
  }
  #btnRow .btn{
    background:rgba(255,102,0,0.95) !important;
    font-size:12px;padding:6px 14px;
    box-shadow:0 2px 8px rgba(0,0,0,0.4);
  }
  #btnRow #btnP{background:rgba(30,30,60,0.95) !important;}
  #btnRow #btnNew{background:rgba(60,30,10,0.95) !important;}
  /* Hide non-essential UI */
  #devRow{display:none !important;}
  #pwa-banner{display:none !important;}
}

/* ── iPad portrait (768px+) — fill the full width, compact UI ── */
@media(min-width:768px){
  body{align-items:center;}
  #wrap{max-width:100%;padding:2px 4px 4px;gap:2px;width:100vw;}
  canvas{border-radius:6px;}
  .hb{font-size:12px;padding:2px 8px;}
  .hb b{font-size:14px;}
  .bar{height:5px;}
  #msg{font-size:13px;}
  .btn{padding:7px 18px;font-size:13px;}
}

/* ── iPad landscape (1024px+) — maximise canvas height too ── */
@media(min-width:1024px){
  body{align-items:flex-start;overflow:hidden;}
  #wrap{
    /* Fill entire viewport, use flex to make canvas as tall as possible */
    height:100vh;height:100dvh;
    padding:2px 2px 2px;gap:1px;
    justify-content:flex-start;
  }
  /* Canvas fills remaining vertical space after HUD */
  #canvasWrap{flex:1;display:flex;align-items:center;}
  canvas{
    /* Scale to fill available height while respecting 600:340 ratio */
    width:auto !important;
    height:100% !important;
    max-height:calc(100dvh - 110px);
    max-width:100%;
  }
}
</style>

// ── polyfill ──────────────────────────────────────────────────────────────
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    if(typeof r==="number")r=[r,r,r,r];
    else if(!Array.isArray(r)||!r.length)r=[0,0,0,0];
    while(r.length<4)r.push(r[r.length-1]);
    this.moveTo(x+r[0],y);this.lineTo(x+w-r[1],y);this.arcTo(x+w,y,x+w,y+r[1],r[1]);
    this.lineTo(x+w,y+h-r[2]);this.arcTo(x+w,y+h,x+w-r[2],y+h,r[2]);
    this.lineTo(x+r[3],y+h);this.arcTo(x,y+h,x,y+h-r[3],r[3]);
    this.lineTo(x,y+r[0]);this.arcTo(x,y,x+r[0],y,r[0]);
    this.closePath();return this;
  };
}

function _resizeCanvas(){
  const dpr=window.devicePixelRatio||1;
  const rect=CV.getBoundingClientRect();
  const cw=Math.round((rect.width||600)*dpr);
  const ch=Math.round((rect.height||340)*dpr);
  if(CV.width===cw&&CV.height===ch)return; // no change needed
  CV.width=cw;
  CV.height=ch;
}
// Call once now (before first paint) and on resize
_resizeCanvas();
window.addEventListener('resize',()=>{_resizeCanvas();});

const rnd=(a,b)=>a+Math.random()*(b-a);
const rndi=(a,b)=>Math.floor(rnd(a,b));
const cl=(v,a,b)=>Math.max(a,Math.min(b,v));
function overlap(a,b,m=0){return a.x+m<b.x+b.w&&a.x+a.w-m>b.x&&a.y+m<b.y+b.h&&a.y+a.h-m>b.y;}
function setMsg(t,d=0){UI.msg.textContent=t;if(d)setTimeout(()=>{if(UI.msg.textContent===t)UI.msg.textContent="";},d);}
function notify(msg,icon,col,dur=2.5){if(notifs.some(n=>n.msg===msg&&n.t<n.dur))return;if(notifs.length>=3)notifs=notifs.slice(-2);notifs.push({msg,icon,col,t:0,dur});}
function pop(x,y,t,col){G.pops&&G.pops.push({x,y,t,col,life:0.9,vy:-90});}
function burst(x,y,col,n=8,big=false){
  if(!G.parts)return;
  const space=150-G.parts.length;
  const cnt=Math.min(n,Math.max(0,space));
  for(let i=0;i<cnt;i++){const a=rnd(0,Math.PI*2),s=rnd(big?80:45,big?180:120);G.parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:big?1.4:0.9,ml:big?1.4:0.9,col,rad:rnd(big?4:2,big?9:5)});}
}

let AC=null;
function ac(){if(!AC){try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}return AC;}
function tone(f,d,v,tp="square"){try{const a=ac();if(!a)return;const o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type=tp;o.frequency.value=f;const n=a.currentTime;g.gain.setValueAtTime(v||0.1,n);g.gain.exponentialRampToValueAtTime(0.001,n+d);o.start(n);o.stop(n+d+0.01);}catch(e){}}
function slide(f1,f2,d,v){try{const a=ac();if(!a)return;const o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type="sawtooth";const n=a.currentTime;o.frequency.setValueAtTime(f1,n);o.frequency.exponentialRampToValueAtTime(f2,n+d);g.gain.setValueAtTime(v||0.1,n);g.gain.exponentialRampToValueAtTime(0.001,n+d);o.start(n);o.stop(n+d+0.01);}catch(e){}}

let bgLevel=1;
function startBg(){
  if(bgOn)return;bgOn=true;bgLevel=G.level||1;
  _bgLoop();
}
function _bgLoop(){
  if(!bgOn)return;
  const theme=LV_MUSIC[bgLevel]||LV_MUSIC[1];
  // Switch theme if level changed
  if((G.level||1)!==bgLevel){bgLevel=G.level||1;}
  const t=LV_MUSIC[bgLevel]||LV_MUSIC[1];
  // Dynamic intensity: faster + louder when boss is angry or frenzy
  const intense=(G.bActive&&G.boss&&(G.boss.angry||G.bAge>25))||G.frenzyT>0;
  const len=t.len*(intense?0.78:1);
  const vol=t.vol*(intense?1.5:1);
  const bVol=t.basVol*(intense?1.5:1);
  try{const a=ac();if(!a){setTimeout(_bgLoop,len*1000);bgStep=(bgStep+1)%t.mel.length;return;}
  const n=a.currentTime;
  // Lead melody with slight vibrato on slow themes
  const om=a.createOscillator(),gm=a.createGain();om.connect(gm);gm.connect(a.destination);
  om.type=t.type;
  const freq=t.mel[bgStep];
  om.frequency.setValueAtTime(freq,n);
  if(t.len>0.22){om.frequency.setValueAtTime(freq*1.008,n+len*0.4);om.frequency.setValueAtTime(freq,n+len*0.7);}
  gm.gain.setValueAtTime(0,n);gm.gain.linearRampToValueAtTime(vol,n+0.01);gm.gain.exponentialRampToValueAtTime(0.001,n+len*0.82);
  om.start(n);om.stop(n+len);
  // Bass
  const ob=a.createOscillator(),gb=a.createGain();ob.connect(gb);gb.connect(a.destination);
  ob.type=t.basType;ob.frequency.value=t.bas[bgStep];
  gb.gain.setValueAtTime(0,n);gb.gain.linearRampToValueAtTime(bVol,n+0.01);gb.gain.exponentialRampToValueAtTime(0.001,n+len*1.2);
  ob.start(n);ob.stop(n+len+0.05);
  // Add harmony note on every 4th beat of intense sections

function bossShoot(spd,spread){
  const b=G.boss,t=G.tot;if(!b)return;
  if(b.projs.length>=18)return;
  const ax=t.x+t.w/2-(b.x+b.w/2),ay=t.y+t.h/2-(b.y+b.h/2),base=Math.atan2(ay,ax);
  const angs=spread?[-0.38,0,0.38]:[0];
  for(const da of angs){
    const vx=Math.cos(base+da)*spd,vy=Math.sin(base+da)*spd;
    let type="paper",r=0,col="",grav=0;
    if(G.level===2){type="steam";if(b.projs.length<18){const cnt=spread?5:3;for(let i=0;i<cnt&&b.projs.length<18;i++){const a=(i/cnt)*Math.PI*2;b.projs.push({x:b.x+b.w/2,y:b.y+b.h/2,vx:Math.cos(a)*160,vy:Math.sin(a)*160,life:1.0,rot:0,rv:2,type:"steam",r:0,col:"",grav:0});}return;}else return;}
    else if(G.level===3){type="cannon";r=10;grav=80;}
    else if(G.level===5){type="orb";r=11;col=["#ff44ff","#44ffcc","#ff8844","#ffff44"][rndi(0,4)];}
    b.projs.push({x:b.x+b.w/2,y:b.y+b.h/2,vx,vy,life:2.2,rot:rnd(0,Math.PI*2),rv:rnd(-2,2),type,r,col,grav});
  }
}
function runBossAtk(dt2){
  const b=G.boss;if(!b)return;
  if(b.projs.length>18)b.projs=b.projs.slice(-18);
  const spd=cl(190+(b.maxHp-b.hp)*4,190,360);
  b.sT+=dt2;if(b.sT>=b.sI){b.sT=0;b.sI=Math.max(0.6,b.sI-0.018);bossShoot(spd,false);}
  if(b.angry){b.aT+=dt2;if(b.aT>=b.aI){b.aT=0;b.aI=Math.max(1.4,b.aI-0.015);bossShoot(spd*1.1,true);}}
  if(G.level===2){
    b.ladleT+=dt2;
    if(!b.ladleSwing&&b.ladleT>=b.ladleI){b.ladleSwing=true;b.ladleAngle=-1.5;b.ladleT=0;b.ladleI=Math.max(0.8,b.ladleI-0.015);}
    if(b.ladleSwing){b.ladleAngle+=dt2*2.4;const lx=b.x+b.w/2+Math.cos(b.ladleAngle)*78,ly=b.y+b.h/2+Math.sin(b.ladleAngle)*78;if(G.tot.inv<=0&&!G.upg.ghost){const dx=G.tot.x+G.tot.w/2-lx,dy=G.tot.y+G.tot.h/2-ly;if(dx*dx+dy*dy<24*24)hitPlayer();}if(b.ladleAngle>1.6)b.ladleSwing=false;}
  }
  if(G.level===4){
    if(!b.diving){b.diveT+=dt2;if(b.diveT>=b.diveI){b.diveT=0;b.diving=true;b.diveDur=0.55;b.diveI=Math.max(1.4,b.diveI-0.015);const ax2=G.tot.x+G.tot.w/2-(b.x+b.w/2),ay2=G.tot.y+G.tot.h/2-(b.y+b.h/2);const len=Math.sqrt(ax2*ax2+ay2*ay2)||1,sp=b.angry?370:260;b.diveVx=(ax2/len)*sp;b.diveVy=(ay2/len)*sp;}}
    else{b.x+=b.diveVx*dt2;b.y+=b.diveVy*dt2;b.diveDur-=dt2;if(G.tot.inv<=0&&!G.upg.ghost&&overlap(G.tot,b,6))hitPlayer();if(b.diveDur<=0){b.diving=false;b.vx=-(90+G.level*15);b.vy=rnd(-70,70);}}
  }
}

// ── update ────────────────────────────────────────────────────────────────
function update(now){
  if(ST==="title"){titleT+=(now-(G.lastTime||now));G.lastTime=now;return;}
  // tick notifications
  for(const n of notifs)n.t+=Math.min((now-(G.lastTime||now))/1000,0.05);
  notifs=notifs.filter(n=>n.t<n.dur+0.4);
  if(ST==="initials"||ST==="gameover")return;
  if(ST==="death"){
    const rawDt=Math.min((now-(G.lastTime||now))/1000,0.04);
    G.lastTime=now;deathT+=rawDt;return;
  }
  if(ST!=="playing")return;

  const rawDt=(now-G.lastTime)/1000;
  dt=Math.min(rawDt,0.04);G.lastTime=now;
  const f=dt;

  // overlay countdown (game keeps running under it)
  if(oActive){oT+=f;if(oT>=oDur){oActive=false;if(oDone){const fn=oDone;oDone=null;fn();}}}

  const t=G.tot;
  if(t.inv>0)t.inv-=f;
  if(G.ghostT>0){G.ghostT-=f;if(G.ghostT<=0){G.upg.ghost=false;updHud();}}
  if(G.freezeT>0){G.freezeT-=f;if(G.freezeT<=0){G.upg.freeze=false;updHud();}}
  if(G.dblT>0){G.dblT-=f;if(G.dblT<=0){G.upg.dbl=false;updHud();}}
  if(G.frenzyT>0)G.frenzyT-=f;
  if(G.flash>0)G.flash=Math.max(0,G.flash-f);

  // movement — crisp and snappy
  const _uwSlow=G.level===3?0.7:1.0;
  const A=1800*_uwSlow,MX=430*_uwSlow;
  if(keys.ArrowLeft||keys.KeyA){t.vx-=A*f;t.dir=-1;}
  if(keys.ArrowRight||keys.KeyD){t.vx+=A*f;t.dir=1;}
  if(keys.ArrowUp||keys.KeyW)t.vy-=A*f;
  if(keys.ArrowDown||keys.KeyS)t.vy+=A*f;
  t.vx=cl(t.vx,-MX,MX)*(1-Math.min(0.98,12*f));
  t.vy=cl(t.vy,-MX,MX)*(1-Math.min(0.98,12*f));
  t.x=cl(t.x+t.vx*f,0,W-t.w);t.y=cl(t.y+t.vy*f,0,H-t.h);t.wf+=f*5;

  if(G.baby&&G.upg.baby){G.baby.x+=(t.x-28-G.baby.x)*Math.min(1,f*10);G.baby.y+=(t.y+t.h-G.baby.y)*Math.min(1,f*10);G.baby.dir=t.dir;G.baby.wf=(G.baby.wf||0)+f*5;}
  if(G.upg.magnet)for(const it of G.items){const dx=t.x+t.w/2-(it.x+it.w/2),dy=t.y+t.h/2-(it.y+it.h/2),d=Math.sqrt(dx*dx+dy*dy)||1;if(d<140){it.x+=dx/d*220*f;it.y+=dy/d*220*f;}}

  G.shootT+=f;if(G.shootT>=shootInt()){G.shootT=0;fire();}

  // ── Per-level signature hazards ──────────────────────────────────────────
  G.hazardTimer+=f;
  if(G.level===5){
    // ISLAND: sea breeze / wind gusts push the tot
    G.windTimer-=f;
    if(G.windTimer<=0){
      G.windActive=!G.windActive;
      if(G.windActive){G.windDir=Math.random()<0.5?1:-1;G.windForce=rnd(100,180);G.windTimer=rnd(5.0,9.0);setMsg(G.windDir>0?"SEA BREEZE >>":"<< SEA BREEZE",1400);notify(G.windDir>0?"Sea breeze blowing RIGHT!":"Sea breeze blowing LEFT!","🌬","#88ccff");}
      else{G.windForce=0;G.windTimer=rnd(6,11);}
    }
    if(G.windActive&&t.inv<=0){t.vx+=G.windDir*G.windForce*f*2.5;if(t.vx*G.windDir<0)t.vx*=(1-f*5);}
  }
  if(G.level===2){
    // KITCHEN: pulsing steam patches — damage on contact
    for(const sp of G.steamPatches){
      sp.t+=f*1.8;
      const pulse=(Math.sin(sp.t)+1)/2;
      if(pulse>0.55&&t.inv<=0){
        // Damage in the steam column (above vent, up to column height)
        const steamH=pulse*H*0.28,ventY=H*0.55;
        const inX=Math.abs(t.x+t.w/2-sp.x)<sp.r*0.9;
        const inY=t.y+t.h>ventY-steamH&&t.y<ventY;
        if(inX&&inY)hitPlayer();
      }
    }
  }
  if(G.level===3){
    // UNDERWATER: movement reduced to 70% — applied via multiplier on velocity cap
    // (handled in movement section via G.level check — no extra update needed)
  }
  if(G.level===4){
    // JUNGLE: dark patches drift around, reduce visibility when inside
    for(const dp of G.darkPatches){
      dp.x+=dp.vx*f;dp.y+=dp.vy*f;dp.t+=f*0.5;
      dp.vx+=Math.sin(dp.t)*8*f;dp.vy+=Math.cos(dp.t*0.7)*8*f;
      if(dp.x<40)dp.vx=Math.abs(dp.vx);if(dp.x>W-40)dp.vx=-Math.abs(dp.vx);
      if(dp.y<20)dp.vy=Math.abs(dp.vy);if(dp.y>H-40)dp.vy=-Math.abs(dp.vy);
    }
  }
  if(G.level===5){
    // ISLAND: periodic tide waves sweep across screen
    if(!G.tideWave.active&&G.hazardTimer>8){
      G.tideWave.active=true;G.tideWave.dir=Math.random()<0.5?1:-1;
      G.tideWave.x=G.tideWave.dir>0?-G.tideWave.w:W+G.tideWave.w;
      G.tideWave.spd=rnd(200,300);G.hazardTimer=0;
      setMsg(G.tideWave.dir>0?"TIDE WAVE INCOMING >>":"<< TIDE WAVE INCOMING",1400);notify(G.tideWave.dir>0?"Tide wave! Move UP or DOWN →":"← Tide wave! Move UP or DOWN","🌊","#44aaff");
    }
    if(G.tideWave.active){
      G.tideWave.x+=G.tideWave.dir*G.tideWave.spd*f;
      // Damage player if wave hits
      if(t.inv<=0){const wx=G.tideWave.x,ww=G.tideWave.w;if(t.x+t.w>wx&&t.x<wx+ww)hitPlayer();}
      if(G.tideWave.x>W+100||G.tideWave.x<-100)G.tideWave.active=false;
    }
  }

  // level timer + boss trigger
  if(!G.bActive&&!G.bBeaten){
    G.lElapsed=now-G.lStart;
    const s=Math.floor(G.lElapsed/1000);
    UI.tim.textContent=Math.floor(s/60)+":"+(s%60<10?"0":"")+s%60;
    UI.tf.style.width=Math.min(100,G.lElapsed/G.LDUR*100)+"%";
    if(G.lElapsed>=G.LDUR)spawnBoss();
    if(G.lElapsed>=G.LDUR-15000&&G.lElapsed<G.LDUR-14800&&!G.bossWarned){G.bossWarned=true;setMsg("BOSS INCOMING IN 15 SECONDS!!",3000);notify("BOSS INCOMING in 15 seconds!","💀","#ff44ff",3.5);}
  }

  // level events
  if(!G.bActive&&!G.bBeaten){
    G.eventT+=f;
    if(G.eventT-G.lastEventT>=18){
      G.lastEventT=G.eventT;G.waveNum++;
      const ev=rndi(0,4);
      if(ev===0){setMsg("MUSTARD RAIN! Grab it!",2000);notify("Mustard rain! Grab the condiments!","🌟","#FFC200");for(let i=0;i<6;i++)G.items.push({x:W+rnd(30,400),y:rnd(20,H-40),w:22,h:28,type:"mustard",wobble:rnd(0,Math.PI*2),spd:rnd(80,130),spent:false});}
      else if(ev===1&&G.lElapsed/1000>(G.level===1?35:22)){
  G.frenzyT=5;setMsg("ENEMY FRENZY!! 8 NEW ENEMIES!!",2000);notify("ENEMY FRENZY! Watch all sides!","⚡","#ff4400",3.0);G.flash=0.18;G.flashCol="#ff4400";
  // Speed up existing enemies
  for(const e of G.enemies){e.spd*=1.8;e.vy*=1.8;}
  // Force-spawn 8 new enemies ignoring the cap
  for(let fi=0;fi<8;fi++){
    const d=getDiff()*1.5,sl=G.freezeT>0?0.4:1,types=eTypes(),etype=types[rndi(0,types.length)];
    G.enemies.push({x:W+rnd(40,350),y:rnd(20,H-50),w:46,h:30,vy:rnd(-160,160)*d*sl,spd:rnd(160,280)*d*sl,stT:rnd(0.8,2.0),ef:rnd(0,6.28),spent:false,hp:eHp(),etype});
    G.totalSpawned++;
  }
}
      else if(ev===2){setMsg("POWER SURGE! Powerups!",2000);notify("Power surge! Grab the powerups!","⚡","#44ffaa");for(let i=0;i<3;i++)spawnPwup();}
      else{setMsg("WAVE "+G.waveNum+"! More incoming!",2000);for(let i=0;i<4;i++)spawnEnemy();}
    }
  }

  // laser timer
  if(G.upg.laser&&G.laserT>0){G.laserT-=f;if(G.laserT<=0){G.upg.laser=false;updHud();setMsg("Laser expired",800);}}
  // shots — with special weapon physics
  for(const s of G.shots){
    // Homing missile tracks nearest target
    if(s.stype==='missile'){
      s.age=(s.age||0)+f;
      const targets=G.bActive&&G.boss?[{x:G.boss.x+G.boss.w/2,y:G.boss.y+G.boss.h/2}]:G.enemies.filter(e=>!e.spent&&e.x>s.x-50);
      if(targets.length>0){
        const tgt=targets.reduce((a,b)=>Math.abs(b.x-s.x)<Math.abs(a.x-s.x)?b:a);
        const tx=tgt.x-(s.stype==='missile'?0:0),ty='y' in tgt?tgt.y:tgt.y;
        const dx=(tx||tgt.x)-s.x, dy=(ty||tgt.y)-s.y;
        const ang2=Math.atan2(dy,dx);
        const turnRate=2.5*f;
        const curAng=Math.atan2(s.vy,s.vx);
        let diff=ang2-curAng;while(diff>Math.PI)diff-=Math.PI*2;while(diff<-Math.PI)diff+=Math.PI*2;
        const newAng=curAng+Math.sign(diff)*Math.min(Math.abs(diff),turnRate);
        const spd2=420;s.vx=Math.cos(newAng)*spd2;s.vy=Math.sin(newAng)*spd2;
      }
    }
    // Bomb bounces off walls
    if(s.stype==='bomb'){
      if((s.y<=12||s.y>=H-12)&&(s.bounces||0)>0){s.vy=-s.vy;s.bounces--;}
      s.y=cl(s.y,12,H-12);
    }
    s.x+=s.vx*f;s.y+=s.vy*f;s.life-=f;
  }
  G.shots=G.shots.filter(s=>!s.spent&&s.life>0&&s.x<W+40&&s.x>-20&&s.y<H+20&&s.y>-20);
  for(const ff of G.fries){ff.x+=ff.vx*f;ff.y+=ff.vy*f;ff.life-=f;}
  G.fries=G.fries.filter(ff=>!ff.spent&&ff.life>0&&ff.x<W+20&&ff.x>-20&&ff.y<H+20&&ff.y>-20);

  // bomb explosion helper
  function bombExplode(bx,by){burst(bx,by,"#ff4400",14,true);G.flash=0.25;G.flashCol="#ff4400";SFX.nuke&&SFX.nuke();tone(120,0.3,0.2,"sawtooth");G.enemies.forEach(e=>{if(!e.spent){const dx=e.x+e.w/2-bx,dy=e.y+e.h/2-by;if(dx*dx+dy*dy<70*70){e.hp-=3;if(e.hp<=0){e.spent=true;SFX.enemyDie();const pts=(E_PTS[e.etype]||3)*(G.dblT>0?2:1);G.score+=pts;UI.sc.textContent=G.score;}}}});if(G.boss&&G.bActive)damageBoss(3);}

  // shots vs enemies
  if(!G.bActive){
    for(const s of G.shots){if(s.spent)continue;for(const e of G.enemies){if(e.spent)continue;if(overlap({x:s.x-s.len/2,y:s.y-s.w/2,w:s.len,h:s.w},e,0)){
      if(s.stype==='bomb'){s.spent=true;bombExplode(s.x,s.y);break;}
      const dmg=s.stype==='missile'?4:1;
      e.hp-=dmg;
      if(s.stype!=='laser'&&powerLevel<4)s.spent=true; // laser pierces
      if(e.hp<=0){e.spent=true;burst(e.x+e.w/2,e.y+e.h/2,"#88ff44",7);SFX.enemyDie();const base=E_PTS[e.etype]||3,pts=G.dblT>0?base*2:base;pop(e.x+e.w/2,e.y,"+"+pts,"#ffee00");G.score+=pts;UI.sc.textContent=G.score;if(G.score>best){best=G.score;UI.bs.textContent=best;}}else burst(e.x,e.y,"#aaffaa",3);if(s.stype!=='laser')break;}}}
    G.shots=G.shots.filter(s=>!s.spent);G.enemies=G.enemies.filter(e=>!e.spent);
  }

  // fries vs boss
  if(G.bActive&&G.boss){
    for(const ff of G.fries){if(ff.spent)continue;if(overlap({x:ff.x-ff.w/2,y:ff.y-ff.h/2,w:ff.w,h:ff.h},G.boss,0)){ff.spent=true;burst(ff.x,ff.y,"#ffcc00",5);damageBoss(1);}}
    G.fries=G.fries.filter(ff=>!ff.spent);
  }

  // items
  for(const it of G.items){it.x-=it.spd*f;it.wobble+=f*3;}
  for(const it of G.items){if(it.spent)continue;if(overlap(t,it,4)){const pts=it.type==="mustard"?2:1,pwr=it.type==="mustard"?9:3,actual=G.dblT>0?pts*2:pts;burst(it.x+it.w/2,it.y+it.h/2,it.type==="mustard"?"#FFC200":"#E03020",7);pop(it.x+it.w/2,it.y,"+"+actual,it.type==="mustard"?"#FFC200":"#ff8888");it.spent=true;G.score+=actual;UI.sc.textContent=G.score;if(G.score>best){best=G.score;UI.bs.textContent=best;}addPower(pwr);it.type==="mustard"?casinoMustard():casinoCollect();}}
  G.items=G.items.filter(it=>!it.spent&&it.x>-50);

  // powerups
  for(const p of G.pwups){p.x-=p.spd*f;p.wobble+=f*3;}
  for(const p of G.pwups){if(p.spent)continue;if(overlap(t,{x:p.x,y:p.y,w:p.w,h:p.h},5)){p.spent=true;burst(p.x+15,p.y+15,p.col,12,true);pop(p.x+15,p.y,p.label+"!",p.col);SFX.powerup();applyPwup(p.id);}}
  G.pwups=G.pwups.filter(p=>!p.spent&&p.x>-55);

  // enemies (non-boss)
  if(!G.bActive){
    for(const e of G.enemies){
      const sl=G.freezeT>0?0.35:1;e.x-=e.spd*f*sl;e.y+=e.vy*f*sl;e.stT-=f;e.ef+=f*4;
      if(e.stT<=0){e.vy=rnd(-140,140)*getDiff()*(G.freezeT>0?0.35:1);e.stT=rnd(1,2.8);}
      if(e.y<15)e.vy=Math.abs(e.vy);if(e.y>H-e.h-15)e.vy=-Math.abs(e.vy);
      if(!G.upg.ghost&&t.inv<=0&&overlap(t,e,5))hitPlayer();
      if(G.baby&&G.upg.baby&&overlap(G.baby,e,3)){e.spent=true;burst(e.x+e.w/2,e.y+e.h/2,"#ffaacc",6);}
    }
    G.enemies=G.enemies.filter(e=>!e.spent&&e.x>-80);
    while(G.items.length<7)spawnItem();
    G.spawnET+=f;if(G.spawnET>=spawnRate()){G.spawnET=0;spawnEnemy();}
    G.spawnPT+=f;if(G.spawnPT>=18){G.spawnPT=0;spawnPwup();}
  }else{
    // powerups + items continue during boss
    G.spawnPT+=f;if(G.spawnPT>=20){G.spawnPT=0;spawnPwup();}
    while(G.items.length<4)spawnItem();
  }

  // boss
  if(G.bActive&&G.boss){
    const b=G.boss;G.bAge+=f;b.ef+=f*4;b.shake=Math.max(0,b.shake-f);
    if(!b.angry&&b.hp<b.maxHp*0.45){b.angry=true;b.vx*=1.5;b.vy*=1.5;setMsg("BOSS IS ANGRY!!",2000);notify("Boss is ANGRY! Attacks are faster!","🔥","#ff2200",2.5);G.flash=0.28;G.flashCol="#ff0000";}
    if(G.bAge<30){const armorPct=1-G.bAge/30;if(Math.floor(G.bAge*4)%2===0){G.flash=Math.max(G.flash,armorPct*0.07);G.flashCol="#8888ff";}if(G.bAge<1||(Math.floor(G.bAge)%5===0&&G.bAge%1<f*2))setMsg("BOSS ARMOR: "+Math.ceil(30-G.bAge)+"s",900);if(Math.floor(G.bAge)%10===0&&G.bAge%1<0.08&&Math.ceil(30-G.bAge)>0)notify("Boss armor: "+Math.ceil(30-G.bAge)+"s left — keep firing!","🛡","#8888ff",2.5);}
    if(G.stunned){G.stunT-=f;b.x+=Math.sin(b.ef*3)*50*f;if(G.stunT<=0){G.stunned=false;G.bHits=0;setMsg("Boss recovered!",1400);}}
    if(!b.diving&&!G.stunned){b.x+=b.vx*f;b.y+=b.vy*f;if(b.x<W*0.42)b.vx=Math.abs(b.vx);if(b.x>W-b.w-8)b.vx=-Math.abs(b.vx);if(b.y<10)b.vy=Math.abs(b.vy);if(b.y>H-b.h-10)b.vy=-Math.abs(b.vy);}
    if(!G.stunned)runBossAtk(f);
    let phit=false;const bpop=[];
    for(const p of b.projs){
      p.x+=p.vx*f;p.y+=p.vy*f;p.life-=f;if(p.rv)p.rot+=p.rv*f;if(p.grav)p.vy+=p.grav*f;
      if(!phit&&!G.upg.ghost&&t.inv<=0){const hw=p.r||9,hh=p.r||7;if(overlap(t,{x:p.x-hw,y:p.y-hh,w:hw*2,h:hh*2},3)){p.life=0;phit=true;}}
      if(G.baby&&G.upg.baby&&p.life>0){const hw=p.r||9,hh=p.r||7;if(overlap(G.baby,{x:p.x-hw,y:p.y-hh,w:hw*2,h:hh*2},2)){p.life=0;bpop.push({x:p.x,y:p.y});}}
    }
    if(phit)hitPlayer();
    for(const bp of bpop)burst(bp.x,bp.y,"#ffaacc",4);
    b.projs=b.projs.filter(p=>p.life>0);
  }

  for(const c of G.clouds){c.x-=c.spd*f;if(c.x<-c.sz*2){c.x=W+c.sz;c.y=rnd(20,H-80);}}
  if(G.rain)for(const r of G.rain){if(G.level===1){r.y+=r.spd*f;r.x+=r.wx*40*f;if(r.y>H+r.len){r.y=-r.len;r.x=rnd(0,W);}}else if(G.level===4){r.y+=r.spd*f;r.ang+=r.rot*f;if(r.y>H+20){r.y=-20;r.x=rnd(0,W);}}}
  if(G.env)for(const p of G.env){if(G.level===3){p.y-=p.spd*f;if(p.y<-10)p.y=H+10;}if(G.level===5)p.phase+=p.spd*f;}
  for(const p of G.parts){p.x+=p.vx*f;p.y+=p.vy*f;p.vy+=60*f;p.life-=f;}
  G.parts=G.parts.filter(p=>p.life>0);if(G.parts.length>150)G.parts=G.parts.slice(-150);
  for(const p of G.pops){p.y+=p.vy*f;p.life-=f;}
  G.pops=G.pops.filter(p=>p.life>0);
}

function applyPwup(id){
  const u=G.upg;
  if(id==="shield"){u.shield=true;G.shieldHp=3;setMsg("SHIELD ON (3 hits)",1800);}
  else if(id==="magnet"){u.magnet=true;setTimeout(()=>{u.magnet=false;updHud();},12000);setMsg("MAGNET ON",1800);}
  else if(id==="baby"&&!G.baby){u.baby=true;G.baby={x:G.tot.x-28,y:G.tot.y+G.tot.h,w:20,h:16,dir:G.tot.dir,wf:0};setMsg("BABY TOT JOINS!",1800);}

// ── draw ──────────────────────────────────────────────────────────────────
function draw(){
  // Apply scale each frame so logical coords always map to full buffer
const _sx=CV.width/W,_sy=CV.height/H;
CX.setTransform(_sx,0,0,_sy,0,0);
CX.clearRect(0,0,W,H);
  if(ST==="title"){drawTitle();return;}
  drawBg();
  if(G.bActive&&G.boss)drawBoss();
  for(const e of G.enemies)drawEnemy(e);
  for(const it of G.items)drawItem(it);
  for(const p of G.pwups)drawPwup(p);
  drawShots();drawFries();
  for(const p of G.parts){CX.save();CX.globalAlpha=Math.max(0,p.life/p.ml);CX.fillStyle=p.col;CX.beginPath();CX.arc(p.x,p.y,p.rad,0,Math.PI*2);CX.fill();CX.restore();}
  CX.textBaseline="middle";for(const p of G.pops){CX.save();CX.globalAlpha=Math.min(1,p.life/0.4);CX.fillStyle=p.col||"#fff";CX.font="bold 15px Arial";CX.textAlign="center";CX.fillText(p.t,p.x,p.y);CX.restore();}CX.textBaseline="alphabetic";
  if(G.baby&&G.upg.baby){CX.save();CX.globalAlpha=0.9;drawTotShape(G.baby.x,G.baby.y,G.baby.w,G.baby.h,G.baby.dir,G.baby.wf||0,true);CX.restore();}
  drawTot();
  if(G.upg.ghost&&G.ghostT>0){CX.save();CX.globalAlpha=0.2+0.1*Math.sin(G.tot.wf*4);CX.fillStyle="#ccaaff";CX.beginPath();CX.ellipse(G.tot.x+G.tot.w/2,G.tot.y+G.tot.h/2,G.tot.w*0.85,G.tot.h*0.85,0,0,Math.PI*2);CX.fill();CX.restore();}
  if(G.bActive&&G.boss&&G.stunned){CX.save();CX.strokeStyle="rgba(255,255,0,"+(0.4+0.3*Math.sin(G.boss.ef*3))+")";CX.lineWidth=5;CX.beginPath();CX.arc(G.boss.x+G.boss.w/2,G.boss.y+G.boss.h/2,G.boss.w*0.65,0,Math.PI*2);CX.stroke();CX.restore();}
  if(G.frenzyT>0){CX.fillStyle="rgba(255,50,0,"+(0.06+0.05*Math.sin(G.tot.wf*8))+")";CX.fillRect(0,0,W,H);CX.save();CX.fillStyle="rgba(255,120,0,0.9)";CX.font="bold 13px Arial";CX.textAlign="center";CX.textBaseline="top";CX.fillText("FRENZY!!",W/2,4);CX.restore();}
  if(G.flash>0){CX.fillStyle="rgba(255,150,0,"+G.flash+")";CX.fillRect(0,0,W,H);}

  // ── Hazard visuals ────────────────────────────────────────────────────────
  if(G.level===5&&G.windActive){
    // Animated wind lines
    CX.save();CX.strokeStyle="rgba(200,230,255,0.35)";CX.lineWidth=1.5;
    for(let i=0;i<10;i++){
      const wx=(((G.hazardTimer*150*G.windDir)+i*65)%W+W)%W,wy=30+i*30+Math.sin(G.hazardTimer*3+i)*10;
      const len=rnd(20,50);CX.beginPath();CX.moveTo(wx,wy);CX.lineTo(wx+len*G.windDir,wy+rnd(-3,3));CX.stroke();
    }
    CX.fillStyle="rgba(180,210,255,0.12)";CX.fillRect(0,0,W,H);
    CX.restore();
  }
  if(G.level===2&&G.steamPatches.length){
    for(const sp of G.steamPatches){
      const pulse=(Math.sin(sp.t)+1)/2; // 0=cold, 1=hot
      const hot=pulse>0.55;
      // Always draw the vent base so player knows hazard location
      CX.save();
      // Vent base — always visible orange circle
      CX.strokeStyle=hot?"#ff4400":"#aa3300";
      CX.lineWidth=3;CX.beginPath();CX.arc(sp.x,H*0.55,sp.r*0.45,0,Math.PI*2);CX.stroke();
      CX.fillStyle=hot?"rgba(255,80,0,0.3)":"rgba(150,50,0,0.15)";CX.beginPath();CX.arc(sp.x,H*0.55,sp.r*0.45,0,Math.PI*2);CX.fill();
      // Steam column rising from vent — always visible, grows when hot
      const steamH=pulse*H*0.28;const steamAlpha=0.25+pulse*0.55;
      for(let s=0;s<4;s++){
        const sy=H*0.55-s*(steamH/4);const sw=(sp.r*0.4)*(1+s*0.35);const sa=steamAlpha*(1-s*0.2);
        const sg=CX.createRadialGradient(sp.x,sy,0,sp.x,sy,sw);
        sg.addColorStop(0,"rgba(255,255,255,"+sa+")");
        sg.addColorStop(0.6,"rgba(220,220,220,"+(sa*0.5)+")");
        sg.addColorStop(1,"rgba(200,200,200,0)");
        CX.fillStyle=sg;CX.beginPath();CX.arc(sp.x,sy,sw,0,Math.PI*2);CX.fill();
      }
      // HOT warning flash
      if(hot){
        CX.fillStyle="rgba(255,60,0,"+(pulse-0.55)*1.5+")";
        CX.font="bold 11px Arial";CX.textAlign="center";CX.textBaseline="bottom";
        CX.fillText("HOT!",sp.x,H*0.55-steamH-4);
      }
      CX.restore();
    }
  }
  if(G.level===3){
    // Underwater pressure darkening at edges + depth fog
    CX.fillStyle="rgba(0,10,60,0.15)";CX.fillRect(0,0,W,H);
  }
  if(G.level===4&&G.darkPatches.length){
    CX.save();
    for(const dp of G.darkPatches){
      const grad=CX.createRadialGradient(dp.x,dp.y,0,dp.x,dp.y,dp.r);
      grad.addColorStop(0,"rgba(0,0,0,0.7)");
      grad.addColorStop(0.6,"rgba(0,5,0,0.35)");
      grad.addColorStop(1,"rgba(0,0,0,0)");
      CX.fillStyle=grad;CX.beginPath();CX.arc(dp.x,dp.y,dp.r,0,Math.PI*2);CX.fill();
    }
    CX.restore();
  }
  if(G.level===5&&G.tideWave.active){
    const wx=G.tideWave.x,ww=G.tideWave.w;
    CX.save();
    // Glowing wall of water
    const wg=CX.createLinearGradient(wx,0,wx+ww,0);
    wg.addColorStop(0,"rgba(80,180,255,0)");
    wg.addColorStop(0.3,"rgba(80,200,255,0.65)");
    wg.addColorStop(0.7,"rgba(40,160,255,0.75)");
    wg.addColorStop(1,"rgba(80,180,255,0)");
    CX.fillStyle=wg;CX.fillRect(wx,0,ww,H);
    // Foam top
    CX.strokeStyle="rgba(255,255,255,0.8)";CX.lineWidth=3;
    CX.beginPath();for(let y=0;y<H;y+=8)CX.lineTo(wx+ww/2+Math.sin(y*0.2+G.hazardTimer*6)*4,y);CX.stroke();
    CX.restore();
  }
  drawNotifs();
  if(oActive)drawOverlay();
  if(ST==="initials")drawInitials();
  if(paused&&ST==="playing")drawPaused();
  // Draw virtual joystick on mobile during play
  if(_joyActive&&ST==="playing"&&!paused){
    const dx=_joyCur.x-_joyBase.x,dy=_joyCur.y-_joyBase.y;
    const dist=Math.min(JOY_MAX,Math.sqrt(dx*dx+dy*dy));
    const ang=Math.atan2(dy,dx);
    const tx=_joyBase.x+Math.cos(ang)*dist,ty=_joyBase.y+Math.sin(ang)*dist;
    // Base ring
    CX.save();CX.globalAlpha=0.35;CX.strokeStyle="#fff";CX.lineWidth=2;
    CX.beginPath();CX.arc(_joyBase.x,_joyBase.y,JOY_MAX,0,Math.PI*2);CX.stroke();
    // Thumb
    CX.globalAlpha=0.55;CX.fillStyle="#fff";
    CX.beginPath();CX.arc(tx,ty,20,0,Math.PI*2);CX.fill();
    CX.globalAlpha=1;CX.restore();
  }
}

// ── backgrounds ───────────────────────────────────────────────────────────
function drawBg(){
  const lv=G.level;
  if(lv===1)drawBgSky();else if(lv===2)drawBgKitchen();else if(lv===3)drawBgUnderwater();else if(lv===4)drawBgJungle();else if(lv===5)drawBgIsland();else drawBgSky();
}

  CX.fillStyle="rgba(255,240,180,0.9)";CX.beginPath();CX.arc(W*0.85,H*0.18,28,0,Math.PI*2);CX.fill();
  CX.fillStyle="rgba(255,230,150,0.25)";CX.beginPath();CX.arc(W*0.85,H*0.18,44,0,Math.PI*2);CX.fill();
  CX.fillStyle="rgba(255,220,120,0.12)";CX.beginPath();CX.arc(W*0.85,H*0.18,62,0,Math.PI*2);CX.fill();

  // Beach shells

  // Palm trees

function drawShots(){
  for(const s of G.shots){
    CX.save();CX.translate(s.x,s.y);
    if(s.stype==='bomb'){
      // Bouncing bomb — black circle with lit fuse
      const bob=Math.sin(s.life*18)*2;
      CX.fillStyle="#222";CX.beginPath();CX.arc(0,bob,s.w/2,0,Math.PI*2);CX.fill();
      CX.strokeStyle="#555";CX.lineWidth=2;CX.beginPath();CX.arc(0,bob,s.w/2,0,Math.PI*2);CX.stroke();
      // Fuse spark
      const sparkPulse=Math.sin(s.life*25);
      CX.strokeStyle="#ff6600";CX.lineWidth=2;CX.beginPath();CX.moveTo(0,bob-s.w/2);CX.lineTo(4,bob-s.w/2-6+sparkPulse*2);CX.stroke();
      CX.fillStyle=sparkPulse>0?"#ffee00":"#ff4400";CX.beginPath();CX.arc(4,bob-s.w/2-6+sparkPulse*2,3,0,Math.PI*2);CX.fill();
      // Danger glow
      CX.shadowColor="#ff4400";CX.shadowBlur=12;CX.fillStyle="rgba(255,80,0,0.3)";CX.beginPath();CX.arc(0,bob,s.w/2+4,0,Math.PI*2);CX.fill();CX.shadowBlur=0;
    } else if(s.stype==='missile'){
      // Homing missile — rocket shape pointing in direction of travel
      const ang=Math.atan2(s.vy,s.vx);
      CX.rotate(ang);
      // Body
      CX.fillStyle="#cc4400";CX.beginPath();CX.moveTo(s.len/2,0);CX.lineTo(-s.len/2,-s.w/2);CX.lineTo(-s.len/2,s.w/2);CX.closePath();CX.fill();
      CX.fillStyle="#ff6600";CX.beginPath();CX.moveTo(s.len/2,0);CX.lineTo(0,-s.w/3);CX.lineTo(0,s.w/3);CX.closePath();CX.fill();
      // Fins
      CX.fillStyle="#884400";CX.beginPath();CX.moveTo(-s.len/2,0);CX.lineTo(-s.len/2-8,-s.w);CX.lineTo(-s.len/2+4,0);CX.closePath();CX.fill();
      CX.beginPath();CX.moveTo(-s.len/2,0);CX.lineTo(-s.len/2-8,s.w);CX.lineTo(-s.len/2+4,0);CX.closePath();CX.fill();
      // Flame trail
      CX.fillStyle="rgba(255,200,50,"+(0.5+0.5*Math.sin(s.life*20))+")";CX.beginPath();CX.ellipse(-s.len/2-6,0,8+Math.random()*6,4,0,0,Math.PI*2);CX.fill();
      // Glow
      CX.shadowColor="#ff8800";CX.shadowBlur=10;CX.strokeStyle="#ff4400";CX.lineWidth=1;CX.beginPath();CX.moveTo(s.len/2,0);CX.lineTo(-s.len/2,0);CX.stroke();CX.shadowBlur=0;
    } else if(s.stype==='laser'){
      // Laser beam — full width cyan piercing
      const pulse=0.7+0.3*Math.sin(s.life*60);
      CX.shadowColor="#44ffff";CX.shadowBlur=18;
      CX.fillStyle=`rgba(0,255,255,${pulse})`;CX.fillRect(0,-s.w/2,s.len,s.w);
      CX.fillStyle=`rgba(255,255,255,${pulse*0.8})`;CX.fillRect(0,-s.w/4,s.len,s.w/2);
      CX.shadowBlur=0;
    } else {
      // Normal shot
      CX.shadowColor="#ff3300";CX.shadowBlur=5;CX.fillStyle="#ff5500";CX.beginPath();CX.roundRect(-s.len/2,-s.w/2,s.len,s.w,3);CX.fill();CX.fillStyle="#ffee00";CX.beginPath();CX.roundRect(-s.len/2+2,-s.w/2+1,s.len-4,s.w-2,2);CX.fill();CX.shadowBlur=0;
    }
    CX.restore();
  }
}
function drawFries(){for(const ff of G.fries){CX.save();CX.translate(ff.x,ff.y);
  // Special weapons also appear in boss fights
  if(ff.stype==='bomb'||ff.stype==='missile'){
    // reuse shot drawing style for these
    if(ff.stype==='bomb'){CX.fillStyle="#222";CX.beginPath();CX.arc(0,0,9,0,Math.PI*2);CX.fill();CX.fillStyle="#ff6600";CX.beginPath();CX.arc(4,-9,3,0,Math.PI*2);CX.fill();}
    else{const ang=Math.atan2(ff.vy,ff.vx);CX.rotate(ang);CX.fillStyle="#cc4400";CX.beginPath();CX.moveTo(11,0);CX.lineTo(-11,-5);CX.lineTo(-11,5);CX.closePath();CX.fill();}
    CX.restore();continue;
  }
  const wt=ff.wtype||1;
  if(wt===1){// Level 1: french fries (golden yellow)
    CX.rotate(ff.vx>0?0.3:-0.3);CX.fillStyle="#D4A830";CX.beginPath();CX.roundRect(-ff.w/2,-ff.h/2,ff.w,ff.h,2);CX.fill();CX.fillStyle="#FFE060";CX.beginPath();CX.roundRect(-ff.w/2+1,-ff.h/2+1,ff.w-2,ff.h-4,1);CX.fill();
  }else if(wt===2){// Level 2: glowing hot ladle
    CX.rotate(ff.vx>0?0.35:-0.35);
    // Ladle handle — thick and visible
    CX.fillStyle="#888888";CX.beginPath();CX.roundRect(ff.w*0.1,-ff.h*0.18,ff.w*1.8,ff.h*0.36,4);CX.fill();
    CX.fillStyle="#aaaaaa";CX.beginPath();CX.roundRect(ff.w*0.15,-ff.h*0.12,ff.w*1.6,ff.h*0.24,3);CX.fill();
    // Ladle bowl — big orange-hot
    CX.fillStyle="#cc4400";CX.beginPath();CX.ellipse(-ff.w*0.1,0,ff.w*0.85,ff.h*0.55,0,0,Math.PI*2);CX.fill();
    CX.fillStyle="#ff8800";CX.beginPath();CX.ellipse(-ff.w*0.1,0,ff.w*0.65,ff.h*0.42,0,0,Math.PI*2);CX.fill();
    CX.fillStyle="#ffcc44";CX.beginPath();CX.ellipse(-ff.w*0.18,-ff.h*0.1,ff.w*0.3,ff.h*0.2,0,0,Math.PI*2);CX.fill();
    // Hot glow
    CX.save();CX.shadowColor="#ff6600";CX.shadowBlur=10;CX.strokeStyle="rgba(255,120,0,0.7)";CX.lineWidth=2;CX.beginPath();CX.ellipse(-ff.w*0.1,0,ff.w*0.9,ff.h*0.6,0,0,Math.PI*2);CX.stroke();CX.shadowBlur=0;CX.restore();
  }else if(wt===3){// Level 3: torpedo bubble (cyan sphere)
    CX.fillStyle="#44ddff";CX.beginPath();CX.ellipse(0,0,ff.h*0.5,ff.w*0.35,ff.vx>0?0.3:-0.3,0,Math.PI*2);CX.fill();CX.fillStyle="rgba(255,255,255,0.5)";CX.beginPath();CX.arc(-ff.h*0.12,-ff.w*0.1,ff.w*0.18,0,Math.PI*2);CX.fill();
  }else if(wt===4){// Level 4: poison dart (green needle)
    CX.rotate(ff.vx>0?0.1:-0.1);CX.fillStyle="#44aa22";CX.beginPath();CX.moveTo(ff.h*0.55,0);CX.lineTo(-ff.h*0.45,-ff.w*0.3);CX.lineTo(-ff.h*0.45,ff.w*0.3);CX.closePath();CX.fill();CX.fillStyle="#88ff44";CX.beginPath();CX.moveTo(ff.h*0.45,0);CX.lineTo(-ff.h*0.2,-ff.w*0.18);CX.lineTo(-ff.h*0.2,ff.w*0.18);CX.closePath();CX.fill();
  }else{// Level 5: magic orb (glowing purple)
    const og=CX.createRadialGradient(0,0,0,0,0,ff.w*0.8);og.addColorStop(0,"rgba(255,100,255,0.95)");og.addColorStop(0.5,"rgba(180,50,255,0.7)");og.addColorStop(1,"rgba(100,0,200,0)");CX.fillStyle=og;CX.beginPath();CX.arc(0,0,ff.w*0.8,0,Math.PI*2);CX.fill();CX.shadowColor="#ff88ff";CX.shadowBlur=8;CX.fillStyle="rgba(255,200,255,0.9)";CX.beginPath();CX.arc(-ff.w*0.15,-ff.w*0.15,ff.w*0.22,0,Math.PI*2);CX.fill();CX.shadowBlur=0;
  }
  CX.restore();}}

function drawEnemy(e){

// Broccoli Croc — croc body with broccoli head/back
function dBrocCroc(x,y,ew,eh,ef){
  const jaw=Math.abs(Math.sin(ef))*8;
  // Scaly croc body (dark green)
  CX.fillStyle="#1a5a1a";CX.beginPath();CX.roundRect(x,y+5,ew,eh-5,7);CX.fill();
  // Broccoli florets along the back
  CX.fillStyle="#228B22";
  for(let i=0;i<4;i++){CX.beginPath();CX.arc(x+10+i*10,y+5,7,0,Math.PI*2);CX.fill();}
  CX.fillStyle="#33bb33";
  for(let i=0;i<4;i++){CX.beginPath();CX.arc(x+10+i*10,y+1,5,0,Math.PI*2);CX.fill();}
  // Big broccoli head
  CX.fillStyle="#1a7a1a";CX.beginPath();CX.arc(x+ew/2,y+4,13,0,Math.PI*2);CX.fill();
  CX.fillStyle="#228B22";CX.beginPath();CX.arc(x+ew/2-6,y+6,8,0,Math.PI*2);CX.fill();
  CX.beginPath();CX.arc(x+ew/2+6,y+6,8,0,Math.PI*2);CX.fill();
  // Croc snout with teeth
  CX.fillStyle="#3A9A3A";CX.beginPath();CX.roundRect(x-9,y+eh/2+jaw*0.5,26,9+jaw*0.5,[0,0,4,4]);CX.fill();
  CX.fillStyle="#4DB84D";CX.beginPath();CX.roundRect(x-9,y+eh/2-5,26,11,[4,4,0,0]);CX.fill();
  CX.fillStyle="#fff";for(let i=0;i<3;i++){CX.beginPath();CX.moveTo(x-5+i*6,y+eh/2+5);CX.lineTo(x-2+i*6,y+eh/2+5+jaw*0.8);CX.lineTo(x+1+i*6,y+eh/2+5);CX.fill();}
  // Eyes
  CX.fillStyle="#fff";CX.beginPath();CX.arc(x+5,y+eh/2-2,3.5,0,Math.PI*2);CX.fill();
  CX.fillStyle="#111";CX.beginPath();CX.arc(x+6,y+eh/2-2,2,0,Math.PI*2);CX.fill();
}

// Asparagus Snake — long winding asparagus stalk body with snake head
function dAspSnake(x,y,ew,eh,ef){
  const wave=Math.sin(ef)*6;
  // Asparagus stalk body — segmented green
  CX.strokeStyle="#4a8a00";CX.lineWidth=10;CX.lineCap="round";
  CX.beginPath();for(let i=0;i<=ew;i+=5)CX.lineTo(x+i,y+eh/2+Math.sin(ef+i*0.12)*wave);CX.stroke();
  CX.strokeStyle="#6ab800";CX.lineWidth=6;
  CX.beginPath();for(let i=0;i<=ew;i+=5)CX.lineTo(x+i,y+eh/2+Math.sin(ef+i*0.12)*wave);CX.stroke();
  // Asparagus tip scales along body
  CX.fillStyle="#3a6a00";for(let i=0;i<5;i++){const sx=x+8+i*9,sy=y+eh/2+Math.sin(ef+sx*0.12)*wave;CX.beginPath();CX.arc(sx,sy-5,3,0,Math.PI*2);CX.fill();}
  // Snake head
  const hx=x+ew-8,hy=y+eh/2+wave;
  CX.fillStyle="#5aaa00";CX.beginPath();CX.ellipse(hx,hy,12,8,0,0,Math.PI*2);CX.fill();
  CX.fillStyle="#88cc00";CX.beginPath();CX.ellipse(hx-3,hy-2,7,5,0,0,Math.PI*2);CX.fill();
  // Forked tongue
  CX.strokeStyle="#ff4444";CX.lineWidth=1.5;
  CX.beginPath();CX.moveTo(hx+12,hy);CX.lineTo(hx+18,hy-2);CX.stroke();
  CX.beginPath();CX.moveTo(hx+12,hy);CX.lineTo(hx+18,hy+2);CX.stroke();
  // Eyes
  CX.fillStyle="#fff";CX.beginPath();CX.arc(hx+3,hy-3,3,0,Math.PI*2);CX.fill();
  CX.fillStyle="#ff4400";CX.beginPath();CX.arc(hx+4,hy-3,1.5,0,Math.PI*2);CX.fill();
}

// Corn Snake — snake body with corn kernel pattern

// Tomato Toad — fat red toad shaped like a tomato

// ── overlay draw ──────────────────────────────────────────────────────────
function drawNotifs(){
  if(!notifs.length)return;
  const visible=notifs.filter(n=>n.t<n.dur+0.35);
  if(!visible.length)return;
  CX.save();
  visible.forEach((n,i)=>{
    const age=n.t,fadeIn=Math.min(1,age/0.18),fadeOut=Math.max(0,1-(age-n.dur)/0.35);
    const alpha=Math.min(fadeIn,fadeOut);
    if(alpha<=0)return;
    const ypos=H-32-(i*44);
    const w2=Math.min(W*0.72,340);
    const xpos=W/2-w2/2;
    // Background pill
    CX.globalAlpha=alpha*0.88;
    CX.fillStyle="rgba(0,0,0,0.72)";
    CX.beginPath();CX.roundRect(xpos,ypos-16,w2,36,18);CX.fill();
    // Color accent bar on left
    CX.fillStyle=n.col;CX.globalAlpha=alpha*0.9;
    CX.beginPath();CX.roundRect(xpos,ypos-16,5,36,[18,0,0,18]);CX.fill();
    // Icon
    CX.globalAlpha=alpha;CX.font="18px Arial";CX.textBaseline="middle";CX.textAlign="left";
    CX.fillText(n.icon,xpos+14,ypos+2);
    // Message
    CX.fillStyle="#fff";CX.font="bold 13px Arial";CX.textAlign="left";
    CX.fillText(n.msg,xpos+40,ypos+2);
    CX.globalAlpha=1;
  });
  CX.restore();
}

function drawDeath(){

  CX.fillStyle="rgba(0,0,0,"+prog*0.75+")";CX.fillRect(0,0,W,H);
  const sz=Math.min(W,H)*1.9*scale;
  CX.save();CX.translate(W/2,H/2);

  CX.restore();

  const eg=0.5+0.5*Math.sin(deathT*9);CX.fillStyle="rgba(255,0,0,"+(eg*0.55)+")";
  CX.beginPath();CX.arc(-sz*0.13,-sz*0.06,sz*0.09,0,Math.PI*2);CX.fill();CX.beginPath();CX.arc(sz*0.13,-sz*0.06,sz*0.09,0,Math.PI*2);CX.fill();

  CX.fillStyle="#fff";for(let i=-2;i<=2;i++){const tw2=sz*0.06,th2=sz*0.06*mouthAng*2.5;CX.fillRect(i*sz*0.08-tw2/2,my,tw2,Math.max(1,th2));}

}

  for(const tt of _TTOTS2){tt.x+=tt.vx*_ttdt;tt.y+=tt.vy*_ttdt;tt.rot+=tt.rs*_ttdt;tt.ef+=_ttdt*4;if(tt.x<-50)tt.x=W+20;if(tt.x>W+50)tt.x=-20;if(tt.y<-50)tt.y=H+20;if(tt.y>H+50)tt.y=-20;CX.save();CX.translate(tt.x,tt.y);CX.rotate(tt.rot);CX.scale(tt.sz,tt.sz);CX.globalAlpha=0.38;drawTotShape(-18,-15,36,30,1,tt.ef,false);CX.globalAlpha=1;CX.restore();}
  // stars
  for(const s of _STARS){s.x-=s.sp*_ttdt;if(s.x<0)s.x=W;s.blink+=_ttdt*2.5;CX.fillStyle="rgba(255,255,255,"+(0.35+0.55*Math.abs(Math.sin(s.blink)))+")";CX.beginPath();CX.arc(s.x,s.y,s.s,0,Math.PI*2);CX.fill();}
  // meteors
  for(let i=0;i<_METEORS.length;i++){const m=_METEORS[i];m.x+=Math.cos(m.ang)*m.spd*_ttdt;m.y+=Math.sin(m.ang)*m.spd*_ttdt;m.life-=_ttdt*0.45;if(m.x>W+60||m.y>H+60||m.life<=0){_METEORS[i]={x:W+20,y:-20,spd:rnd(220,420),ang:rnd(0.3,0.65),len:rnd(40,90),life:rnd(0.5,1.2)};}const tx=m.x-Math.cos(m.ang)*m.len,ty=m.y-Math.sin(m.ang)*m.len;const gr=CX.createLinearGradient(tx,ty,m.x,m.y);gr.addColorStop(0,"rgba(255,255,200,0)");gr.addColorStop(1,"rgba(255,255,200,"+(Math.min(1,m.life)*0.8)+")");CX.strokeStyle=gr;CX.lineWidth=2;CX.beginPath();CX.moveTo(tx,ty);CX.lineTo(m.x,m.y);CX.stroke();}
  // orbiting tots
  const ab=titleT*0.0008;for(const tt of _TTOTS){const a=tt.ang+ab,ox=W/2+Math.cos(a)*tt.r,oy=H/2+18+Math.sin(a)*tt.r*0.33;CX.save();CX.translate(ox,oy);CX.rotate(a+Math.PI/2);CX.fillStyle="#C8860A";CX.beginPath();CX.roundRect(-12,-8,24,16,5);CX.fill();CX.fillStyle="#E6A020";CX.beginPath();CX.roundRect(-10,-6,20,12,4);CX.fill();CX.fillStyle="#fff";CX.beginPath();CX.arc(-4,-1,3,0,Math.PI*2);CX.fill();CX.beginPath();CX.arc(4,-1,3,0,Math.PI*2);CX.fill();CX.fillStyle="#222";CX.beginPath();CX.arc(-4,-1,1.5,0,Math.PI*2);CX.fill();CX.beginPath();CX.arc(4,-1,1.5,0,Math.PI*2);CX.fill();CX.restore();}
  // bouncing title letters
  const TL=[{ch:"C",col:"#ff4400"},{ch:"R",col:"#ff9900"},{ch:"O",col:"#ffee00"},{ch:"C",col:"#44ff44"},{ch:" ",col:""},{ch:"T",col:"#44aaff"},{ch:"O",col:"#cc44ff"},{ch:"T",col:"#ff44aa"}];
  const sx=W/2-TL.length*23+10;CX.textBaseline="middle";
  for(let i=0;i<TL.length;i++){const tl=TL[i];if(!tl.ch||tl.ch===" ")continue;const bounce=Math.sin(titleT*0.004+i*0.8)*14,sq=1+0.12*Math.sin(titleT*0.004+i*0.8+Math.PI),ox=sx+i*46,oy=H/2-70+bounce;CX.save();CX.translate(ox,oy);CX.scale(1,sq);CX.fillStyle="rgba(0,0,0,0.6)";CX.font="bold 56px Arial";CX.textAlign="left";CX.fillText(tl.ch,3,3);CX.strokeStyle="rgba(0,0,0,0.8)";CX.lineWidth=4;CX.strokeText(tl.ch,0,0);CX.shadowColor=tl.col;CX.shadowBlur=22;CX.fillStyle=tl.col;CX.fillText(tl.ch,0,0);CX.shadowBlur=0;CX.restore();}
  CX.textBaseline="alphabetic";
  // Jackson's photo + credit
  const photoAlpha=0.65+0.35*Math.sin(titleT*0.003);
  CX.save();CX.globalAlpha=photoAlpha;
  // Photo circle
  const px=W/2-95,py=H/2-6,pr=18;
  CX.save();CX.beginPath();CX.arc(px,py,pr,0,Math.PI*2);CX.clip();
  if(JACKSON_PHOTO.complete&&JACKSON_PHOTO.naturalWidth>0){CX.drawImage(JACKSON_PHOTO,px-pr,py-pr,pr*2,pr*2);}
  else{CX.fillStyle="#ffcc99";CX.fillRect(px-pr,py-pr,pr*2,pr*2);}
  CX.restore();
  // White ring around photo
  CX.strokeStyle="rgba(255,230,100,0.7)";CX.lineWidth=2;CX.beginPath();CX.arc(px,py,pr+2,0,Math.PI*2);CX.stroke();
  CX.font="bold 17px Arial";CX.textAlign="left";CX.textBaseline="middle";
  CX.shadowColor="#ffee00";CX.shadowBlur=14;CX.fillStyle="#ffe266";
  CX.fillText("Made by Jackson",px+pr+8,py);
  CX.shadowBlur=0;CX.globalAlpha=1;CX.restore();
  if(leaderboard.length>0){CX.fillStyle="rgba(0,0,0,0.55)";CX.beginPath();CX.roundRect(W/2-130,H/2+52,260,90,10);CX.fill();CX.fillStyle="#FFD700";CX.font="bold 12px Arial";CX.textAlign="center";CX.textBaseline="middle";CX.fillText("HIGH SCORES",W/2,H/2+68);leaderboard.slice(0,4).forEach((e,i)=>{CX.fillStyle=i===0?"#FFD700":"rgba(255,255,255,0.75)";CX.font="11px Arial";CX.fillText((i+1)+". "+e.initials+"  "+e.score+"  Lv"+e.level,W/2,H/2+84+i*14);});}else{CX.fillStyle="rgba(0,0,0,0.5)";CX.beginPath();CX.roundRect(W/2-140,H/2+55,280,55,10);CX.fill();CX.fillStyle="rgba(255,255,255,0.55)";CX.font="12px Arial";CX.textAlign="center";CX.textBaseline="middle";CX.fillText("Press Enter or click Start",W/2,H/2+82);}
  // Big tap-to-start button on canvas — always visible on mobile
  {
    const bw2=200,bh2=52,bx2=W/2-bw2/2,by2=H/2+82;
    // Pulsing glow
    const pulse=0.85+0.15*Math.sin(titleT*0.004);
    CX.save();CX.shadowColor="#ff6600";CX.shadowBlur=20*pulse;
    CX.fillStyle="rgba(255,102,0,"+pulse+")";
    CX.beginPath();CX.roundRect(bx2,by2,bw2,bh2,14);CX.fill();
    CX.shadowBlur=0;
    CX.fillStyle="#fff";CX.font="bold 22px Arial";CX.textAlign="center";CX.textBaseline="middle";
    CX.fillText("▶  TAP TO PLAY",W/2,by2+bh2/2);
    CX.restore();CX.textBaseline="alphabetic";
  }
  CX.textBaseline="alphabetic";
}

// ── game loop ─────────────────────────────────────────────────────────────
function loop(now){
  if(paused){
    G.lastTime=now;
    try{draw();}catch(e){}
    requestAnimationFrame(loop);return;
  }
  if(G.lastTime)dt=Math.min((now-G.lastTime)/1000,0.04);
  try{draw();}catch(e){console.error("DRAW:",e.message);}
  try{update(now);}catch(e){console.error("UPDATE:",e.message);if(G.lastTime)G.lastTime=now;}
  requestAnimationFrame(loop);
}

// ── input ─────────────────────────────────────────────────────────────────
// Mobile initials overlay logic
function showInitOverlay(){
  const ov=document.getElementById('initOverlay');
  const inp=document.getElementById('initInput');
  if(!ov||!inp)return;
  const title=document.getElementById('initTitle');
  if(title)title.textContent=initWon?'YOU WIN!':'GAME OVER';
  inp.value=initStr;
  ov.style.display='flex';
  // Small delay so the overlay renders before keyboard pops
  setTimeout(()=>inp.focus(),100);
}
function hideInitOverlay(){
  const ov=document.getElementById('initOverlay');
  if(ov)ov.style.display='none';
}
function submitInitials(){
  const inp=document.getElementById('initInput');
  if(inp)initStr=(inp.value||'').toUpperCase().replace(/[^A-Z]/g,'').slice(0,3);
  leaderboard.push({initials:initStr||'???',score:G.score,level:G.level,won:initWon});
  leaderboard.sort((a,b)=>b.score-a.score);
  leaderboard=leaderboard.slice(0,10);
  initStr='';
  hideInitOverlay();
  ST='title';UI.btnS.style.display='';UI.btnR.style.display='none';
}

document.addEventListener("keydown",e=>{
  keys[e.code]=true;
  if(["Space","ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.code))e.preventDefault();
  if(e.code==="KeyP"&&ST==="playing"){
    paused=!paused;
    if(UI.btnP)UI.btnP.innerHTML=paused?"&#9654; Resume (P)":"&#9646;&#9646; Pause (P)";
    if(UI.btnNew)UI.btnNew.style.display=paused?'':'none';
    if(paused)stopBg();else startBg();
  }
  if(e.code==="Backquote"){devClick();devClick();devClick();}  // ` key opens dev menu
  if(ST==="initials"){
    if(e.key.length===1&&e.key.match(/[a-zA-Z]/)&&initStr.length<3)initStr+=e.key.toUpperCase();
    if(e.code==="Backspace")initStr=initStr.slice(0,-1);
    if(e.code==="Enter"){leaderboard.push({initials:initStr||"???",score:G.score,level:G.level,won:initWon});leaderboard.sort((a,b)=>b.score-a.score);leaderboard=leaderboard.slice(0,10);ST="title";UI.btnS.style.display="";UI.btnR.style.display="none";}
    return;
  }
  if(e.code==="Enter"&&(ST==="title"||ST==="gameover"))startGame();
});
document.addEventListener("keyup",e=>{keys[e.code]=false;});

// mobile touch drag
let _tid=null;
function _getTouchPos(touch){
  const r=CV.getBoundingClientRect();
  return {x:(touch.clientX-r.left)*(W/r.width), y:(touch.clientY-r.top)*(H/r.height)};
}
// Tap canvas to start game (especially useful in landscape where buttons may be hidden)
// ── Virtual joystick for mobile ───────────────────────────────────────────────
// Touch anywhere: that point becomes the joystick base.
// Drag from there: direction + distance controls movement.
let _joyBase={x:0,y:0},_joyCur={x:0,y:0},_joyActive=false;
const JOY_DEAD=8, JOY_MAX=60; // dead zone + max radius

function _getTouchCanvas(touch){
  const r=CV.getBoundingClientRect();
  return{x:(touch.clientX-r.left)*(W/r.width),y:(touch.clientY-r.top)*(H/r.height)};
}

CV.addEventListener("touchstart",e=>{
  e.preventDefault();
  tryVoice();
  for(const t of e.changedTouches){
    if(_tid===null){
      _tid=t.identifier;
      const p=_getTouchCanvas(t);
      if(ST==="title"){startGame();return;}
      if(ST==="playing"&&!paused){
        _joyBase={x:p.x,y:p.y};_joyCur={x:p.x,y:p.y};_joyActive=true;
      }
    }
  }
},{passive:false});

CV.addEventListener("touchmove",e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier===_tid&&_joyActive&&ST==="playing"&&!paused){
      const p=_getTouchCanvas(t);
      _joyCur={x:p.x,y:p.y};
      const dx=_joyCur.x-_joyBase.x, dy=_joyCur.y-_joyBase.y;
      keys.ArrowLeft=dx<-JOY_DEAD;
      keys.ArrowRight=dx>JOY_DEAD;
      keys.ArrowUp=dy<-JOY_DEAD;
      keys.ArrowDown=dy>JOY_DEAD;
    }
  }
},{passive:false});

CV.addEventListener("touchend",e=>{
  for(const t of e.changedTouches){
    if(t.identifier===_tid){
      _tid=null;_joyActive=false;
      keys.ArrowLeft=keys.ArrowRight=keys.ArrowUp=keys.ArrowDown=false;
    }
  }
},{passive:false});

UI.btnS.addEventListener("click",startGame);
UI.btnR.addEventListener("click",startGame);
if(UI.btnP)UI.btnP.addEventListener("click",()=>{
  if(ST!=="playing")return;
  paused=!paused;
  UI.btnP.innerHTML=paused?"&#9654; Resume (P)":"&#9646;&#9646; Pause (P)";
  if(UI.btnNew)UI.btnNew.style.display=paused?'':'none';
  if(paused)stopBg();else startBg();});

if(UI.btnNew)UI.btnNew.addEventListener("click",()=>{
  paused=false;if(UI.btnNew)UI.btnNew.style.display='none';
  startGame();
});
setTimeout(()=>{UI.btnS.style.display="";},200);
if(window.speechSynthesis){speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();speechSynthesis.getVoices();}
// Show "Add to Home Screen" hint on mobile after 3s if not installed
if(/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)&&!window.navigator.standalone){
  setTimeout(()=>{const b=document.getElementById('pwa-banner');if(b)b.style.display='block';},3000);
}
// Wire up mobile initials overlay
const _initSubmitBtn = document.getElementById('initSubmit');
const _initInp = document.getElementById('initInput');
if(_initSubmitBtn) _initSubmitBtn.addEventListener('click', submitInitials);
if(_initInp){
  _initInp.addEventListener('input', e=>{
    initStr = e.target.value.toUpperCase().replace(/[^A-Z]/g,'').slice(0,3);
    e.target.value = initStr;
  });
  _initInp.addEventListener('keydown', e=>{
    if(e.key==='Enter'){e.preventDefault();submitInitials();}
  });
}

// Resize canvas after layout settles
setTimeout(_resizeCanvas, 100);
setTimeout(_resizeCanvas, 500);
requestAnimationFrame(loop);
</script>
