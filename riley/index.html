<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Riley's Garden</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ff6b9d">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#1a0a2e;display:flex;align-items:center;justify-content:center;height:100dvh;overflow:hidden;font-family:Arial,sans-serif;touch-action:none}
#gw{position:relative;width:100%;max-width:430px;height:100dvh;overflow:hidden}
canvas{display:block;width:100%;height:100%;touch-action:none}
#uio{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none}
#hud{display:flex;justify-content:space-between;align-items:center;padding:10px 14px 6px;background:linear-gradient(to bottom,rgba(0,0,0,.5),transparent);pointer-events:none}
#hudl{display:flex;flex-direction:column;gap:2px}
#lvlb{font-size:12px;color:#ffe066;font-weight:700}
#scrd{font-size:20px;color:#fff;font-weight:700}
#livd{display:flex;gap:4px;font-size:22px}
#cbar{display:flex;justify-content:center;gap:5px;padding:4px 14px;flex-wrap:wrap;pointer-events:none}
.cd{width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,.4);background:rgba(255,255,255,.1);transition:all .3s}
.cd.on{background:#ffe066;border-color:#f90;box-shadow:0 0 6px #fc0}
#timerbar{position:absolute;top:0;left:0;right:0;height:6px;background:rgba(255,255,255,.15)}
#timerfill{height:100%;background:linear-gradient(90deg,#4cde7a,#ffe066);width:100%;border-radius:0 3px 3px 0;transition:background .5s}
#wepbar{position:absolute;bottom:18px;left:12px;display:flex;gap:6px;pointer-events:none;align-items:flex-end}
.wpi{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;background:rgba(0,0,0,.4);border:2px solid rgba(255,255,255,.3);transition:transform .2s,border-color .2s}
.wpi.cur{background:rgba(255,255,255,.25);border-color:#fff;transform:scale(1.22)}
#bbar{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:8px;background:rgba(60,0,0,.75);border-radius:28px;padding:5px 16px;pointer-events:none;opacity:0;transition:opacity .4s;white-space:nowrap}
#bbar.on{opacity:1}
#bblbl{font-size:13px;color:#ff8888;font-weight:700}
#bbhpw{width:110px;height:10px;background:rgba(255,255,255,.15);border-radius:6px;overflow:hidden}
#bbhp{height:100%;background:linear-gradient(90deg,#ff6666,#ff0000);border-radius:6px;width:100%;transition:width .3s}
#fbar{position:absolute;bottom:66px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.55);border-radius:28px;padding:5px 14px;pointer-events:none;opacity:0;transition:opacity .4s;white-space:nowrap}
#fbar.on{opacity:1}
#flbl{font-size:12px;color:#ffe066;font-weight:700}
#ffw{width:80px;height:8px;background:rgba(255,255,255,.2);border-radius:6px;overflow:hidden}
#fff{height:100%;background:linear-gradient(90deg,#ffe066,#f90);border-radius:6px;width:0%}
.scr{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;pointer-events:all}
#ss{background:linear-gradient(160deg,#ff6b9d,#ff9a3c 40%,#ffe066)}
#ss .ttl{font-size:48px;color:#fff;font-weight:900;text-shadow:0 4px 0 rgba(0,0,0,.2);line-height:1.1;margin-bottom:8px}
#ss .sub{font-size:14px;font-weight:700;color:rgba(255,255,255,.9);margin-bottom:32px;line-height:1.6}
.be{font-size:64px;margin-bottom:12px;animation:flt 2s ease-in-out infinite}
@keyframes flt{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.btn{font-size:22px;color:#fff;background:#ff4d8a;border:none;border-radius:48px;padding:14px 44px;cursor:pointer;box-shadow:0 5px 0 #c4005e;transition:transform .1s,box-shadow .1s;pointer-events:all;touch-action:manipulation;font-weight:700}
.btn:active{transform:translateY(3px);box-shadow:0 2px 0 #c4005e}
.btn.g{background:#4cde7a;box-shadow:0 5px 0 #27a84f}.btn.g:active{box-shadow:0 2px 0 #27a84f}
.btn.b{background:#4db8ff;box-shadow:0 5px 0 #1a7dc4}.btn.b:active{box-shadow:0 2px 0 #1a7dc4}
#lcs,#gos,#ws{background:rgba(10,5,30,.9);backdrop-filter:blur(8px)}
.st{font-size:38px;color:#ffe066;font-weight:900;margin-bottom:6px}
.ss2{font-size:16px;font-weight:700;color:rgba(255,255,255,.8);margin-bottom:24px}
.se{font-size:56px;margin-bottom:10px}
.br{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
#lnt{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(.8);background:rgba(0,0,0,.8);border-radius:18px;padding:12px 24px;text-align:center;pointer-events:none;opacity:0;transition:opacity .3s,transform .3s}
#lnt.on{opacity:1;transform:translate(-50%,-50%) scale(1)}
#lntlvl{font-size:13px;color:#ffe066;font-weight:700;margin-bottom:2px}
#lntnm{font-size:22px;color:#fff;font-weight:700}
#sf{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(255,80,80,.4);pointer-events:none;opacity:0;transition:opacity .08s}
#sf.on{opacity:1}
.hid{display:none!important}
#pb{position:absolute;top:8px;right:12px;font-size:20px;background:rgba(0,0,0,.35);border:none;border-radius:50%;width:38px;height:38px;cursor:pointer;pointer-events:all;touch-action:manipulation;color:#fff;z-index:10}
#mb{position:absolute;top:8px;left:12px;font-size:18px;background:rgba(0,0,0,.35);border:none;border-radius:50%;width:36px;height:36px;cursor:pointer;pointer-events:all;touch-action:manipulation;color:#fff;z-index:10}
#ps{background:rgba(10,5,30,.88);backdrop-filter:blur(6px)}
#wnew{position:absolute;top:48%;left:50%;transform:translate(-50%,-50%);background:linear-gradient(135deg,#ff44aa,#aa44ff);border-radius:18px;padding:14px 22px;text-align:center;pointer-events:none;opacity:0;transition:opacity .3s,transform .4s;transform:translate(-50%,-50%) scale(.7)}
#wnew.on{opacity:1;transform:translate(-50%,-50%) scale(1)}
#wnewt{font-size:28px;margin-bottom:4px}
#wnewn{font-size:18px;color:#fff;font-weight:700}
</style>
</head>
<body>
<div id="gw">
  <canvas id="gc"></canvas>
  <div id="uio">
    <div id="timerbar" class="hid"><div id="timerfill"></div></div>
    <div id="hud" class="hid">
      <div id="hudl"><div id="lvlb">LEVEL 1</div><div id="scrd">⭐ 0</div></div>
      <div id="livd"></div>
    </div>
    <div id="cbar" class="hid"></div>
    <div id="wepbar" class="hid"></div>
    <div id="bbar" class="hid"><span id="bblbl">🐻 BEAR BOSS!</span><div id="bbhpw"><div id="bbhp"></div></div></div>
    <div id="fbar" class="hid"><span id="flbl">🍎 Farmer?</span><div id="ffw"><div id="fff"></div></div></div>
  </div>
  <div class="scr" id="ss">
    <div class="be">🌸</div>
    <div class="ttl">Riley's<br>Garden!</div>
    <div class="sub">Pick flowers & fruit 🌸🍓🍊<br>The fairy auto-blasts bees! 🐝✨🌈<br>Dodge snakes & the bear! 🐍🐻</div>
    <button class="btn" id="stbtn">Let's Play! 🌟</button>
    <div style="margin-top:24px;font-size:12px;font-weight:700;color:rgba(255,255,255,.6);letter-spacing:1.5px;text-transform:uppercase">🎮 Built by Riley</div>
  </div>
  <div class="scr hid" id="lcs"><div class="se" id="lce">🌟</div><div class="st">Amazing!</div><div class="ss2" id="lcsub">Level done!</div><div class="br"><button class="btn g" id="nxbtn">Next Level ➡️</button></div></div>
  <div class="scr hid" id="gos"><div class="se">😢</div><div class="st">Ouch!</div><div class="ss2">Try again?</div><div class="br"><button class="btn b" id="rtbtn">Try Again 🔄</button><button class="btn" id="h1btn">Home 🏠</button></div></div>
  <div class="scr hid" id="ws"><div class="se">🏆</div><div class="st">You Win!</div><div class="ss2" id="wsub">Garden superstar!</div><button class="btn g" id="pabtn">Play Again! 🎉</button></div>
  <div class="scr hid" id="ps"><div class="se">⏸️</div><div class="st">Paused</div><div class="br"><button class="btn g" id="rsbtn">Resume ▶️</button><button class="btn" id="h2btn">Home 🏠</button></div></div>
  <div id="lnt"><div id="lntlvl">LEVEL 1</div><div id="lntnm">Sunny Garden</div></div>
  <div id="wnew"><div id="wnewt">✨</div><div id="wnewn">New Weapon!</div></div>
  <div id="sf"></div>
  <button id="pb" class="hid">⏸</button>
  <button id="mb" class="hid">🔊</button>

<script>
// ── Canvas ──────────────────────────────────────────────────
const gc=document.getElementById('gc'),ctx=gc.getContext('2d'),gw=document.getElementById('gw');
let W=400,H=700,DPR=1;
function rsz(){
  DPR=window.devicePixelRatio||1;
  const vw=gw.clientWidth||window.innerWidth||400,vh=gw.clientHeight||window.innerHeight||700;
  W=vw;H=vh;
  const cw=Math.round(W*DPR),ch=Math.round(H*DPR);
  if(gc.width!==cw||gc.height!==ch){gc.width=cw;gc.height=ch;}
}
window.addEventListener('resize',()=>{rsz();if(typeof GS!=='undefined'&&GS==='play')buildLv();});
rsz();requestAnimationFrame(()=>rsz());
function scaleCtx(){ctx.setTransform(DPR,0,0,DPR,0,0);}
function toGame(cx,cy){const r=gc.getBoundingClientRect();return{x:cx-r.left,y:cy-r.top};}

const $=id=>document.getElementById(id);
const show=id=>$(id).classList.remove('hid'),hide=id=>$(id).classList.add('hid');
function showScr(id){['ss','lcs','gos','ws','ps'].forEach(s=>hide(s));if(id)show(id);}

// ── Audio context ────────────────────────────────────────────
let AC=null,muted=false;
const introAudio=$('introAudio')||{paused:true,play:()=>{},pause:()=>{},currentTime:0,volume:1};
function getAC(){if(!AC)try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}return AC;}
function resumeAC(){const a=getAC();if(a&&a.state==='suspended')a.resume();return a;}
function startIntro(){if(muted)return;try{introAudio.currentTime=0;introAudio.volume=0.75;introAudio.play().catch(()=>{});}catch(e){}}
function stopIntro(){try{introAudio.pause();introAudio.currentTime=0;}catch(e){}}

// ── SFX ──────────────────────────────────────────────────────
function sfx(type){
  if(muted)return;const a=resumeAC();if(!a)return;
  const t=a.currentTime;
  function tone(f,d,v,wave,delay){
    delay=delay||0;
    try{const o=a.createOscillator(),g=a.createGain();
      o.type=wave||'sine';o.frequency.value=f;
      g.gain.setValueAtTime(0,t+delay);g.gain.linearRampToValueAtTime(v||.15,t+delay+.01);
      g.gain.exponentialRampToValueAtTime(.001,t+delay+d);
      o.connect(g);g.connect(a.destination);o.start(t+delay);o.stop(t+delay+d+.01);
    }catch(e){}
  }
  if(type==='flower'){tone(523,.12,.18);tone(784,.12,.12);tone(1047,.15,.10);}
  else if(type==='fruit'){tone(659,.08,.2);tone(523,.10,.15);tone(392,.12,.12);}
  else if(type==='orange'){tone(587,.08,.18);tone(784,.08,.15);tone(987,.12,.12);}
  else if(type==='combo'){[784,988,1175,1568].forEach((f,i)=>tone(f,.18,.12,'sine',i*.06));}
  else if(type==='sting'){tone(220,.15,.3,'sawtooth');tone(110,.3,.25,'sawtooth');}
  else if(type==='snake'){tone(180,.12,.28,'sawtooth');}
  else if(type==='farmer'){[392,523,659,784,1047].forEach((f,i)=>tone(f,.28,.14,'sine',i*.09));}
  else if(type==='lc'){[392,523,659,784,1047].forEach((f,i)=>tone(f,.32,.15,'sine',i*.11));}
  else if(type==='win'){[523,659,784,659,784,1047].forEach((f,i)=>tone(f,.45,.16,'sine',i*.13));}
  else if(type==='over'){[392,349,311,261].forEach((f,i)=>tone(f,.35,.16,'sawtooth',i*.18));}
  else if(type==='bosshit'){tone(300,.06,.28,'square');tone(200,.1,.22,'sawtooth');}
  else if(type==='bossdie'){[392,523,659,784,1047,1568].forEach((f,i)=>tone(f,.55,.18,'sine',i*.09));}
  else if(type==='beekill'){tone(800,.04,.12,'square');tone(1200,.05,.1,'sine',.03);}
  else if(type==='snakekill'){tone(600,.06,.14,'square');tone(400,.08,.12,'sawtooth',.03);}
  // Weapon sounds
  else if(type==='wep0'){tone(1800,.05,.06,'sine');tone(2200,.04,.04,'sine',.04);}           // fairy dust
  else if(type==='wep1'){[1400,1700,2000].forEach((f,i)=>tone(f,.06,.05,'sine',i*.025));}   // glitter spray
  else if(type==='wep2'){tone(300,.12,.12,'sawtooth');tone(450,.06,.06,'sine',.05);}         // slime bomb
  else if(type==='wep3'){tone(1000,.08,.14,'square');tone(1400,.06,.08,'sine',.08);}         // star storm
  else if(type==='wep4'){tone(2400,.03,.15,'square');tone(2800,.03,.08,'square',.04);}       // rainbow chain
  else if(type==='wepup'){[600,800,1000,1400,1800].forEach((f,i)=>tone(f,.2,.14,'sine',i*.06));}
}

// ── Background music ─────────────────────────────────────────
const SONGS=[

let _mt=null,_ms=0,_mtime=0,_mlv=0;
function startMusic(lv){
  stopMusic();_ms=0;_mlv=Math.max(0,Math.min(lv,SONGS.length-1));
  const a=resumeAC();if(!a){_mt=setTimeout(()=>startMusic(lv),200);return;}
  if(a.state==='suspended'){a.resume().then(()=>{_mtime=a.currentTime+0.15;_mt=setTimeout(_tick,50);});}
  else{_mtime=a.currentTime+0.15;_mt=setTimeout(_tick,50);}
}
function stopMusic(){if(_mt){clearTimeout(_mt);_mt=null;}}
function _drum(a,type,t){
  try{
    if(type===1){const o=a.createOscillator(),g=a.createGain();o.type='sine';o.frequency.setValueAtTime(160,t);o.frequency.exponentialRampToValueAtTime(40,t+0.08);g.gain.setValueAtTime(0.55,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.18);o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+0.2);}
    else if(type===2){const len=Math.floor(a.sampleRate*0.12),buf=a.createBuffer(1,len,a.sampleRate),d=buf.getChannelData(0);for(let i=0;i<len;i++)d[i]=Math.random()*2-1;const s=a.createBufferSource(),g=a.createGain(),f=a.createBiquadFilter();f.type='bandpass';f.frequency.value=1800;f.Q.value=0.8;s.buffer=buf;s.connect(f);f.connect(g);g.connect(a.destination);g.gain.setValueAtTime(0.28,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.12);s.start(t);s.stop(t+0.14);const o=a.createOscillator(),og=a.createGain();o.type='triangle';o.frequency.setValueAtTime(220,t);o.frequency.exponentialRampToValueAtTime(80,t+0.05);og.gain.setValueAtTime(0.18,t);og.gain.exponentialRampToValueAtTime(0.001,t+0.07);o.connect(og);og.connect(a.destination);o.start(t);o.stop(t+0.08);}
    else if(type===3){const len=Math.floor(a.sampleRate*0.03),buf=a.createBuffer(1,len,a.sampleRate),d=buf.getChannelData(0);for(let i=0;i<len;i++)d[i]=Math.random()*2-1;const s=a.createBufferSource(),g=a.createGain(),f=a.createBiquadFilter();f.type='highpass';f.frequency.value=9000;s.buffer=buf;s.connect(f);f.connect(g);g.connect(a.destination);g.gain.setValueAtTime(0.11,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.03);s.start(t);s.stop(t+0.04);}
    else if(type===4){const len=Math.floor(a.sampleRate*0.18),buf=a.createBuffer(1,len,a.sampleRate),d=buf.getChannelData(0);for(let i=0;i<len;i++)d[i]=Math.random()*2-1;const s=a.createBufferSource(),g=a.createGain(),f=a.createBiquadFilter();f.type='highpass';f.frequency.value=7500;s.buffer=buf;s.connect(f);f.connect(g);g.connect(a.destination);g.gain.setValueAtTime(0.09,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.18);s.start(t);s.stop(t+0.2);}
  }catch(e){}
}
function _note(a,freq,vol,wave,t,dur,cut){
  if(!freq||freq<=0)return;
  try{const o=a.createOscillator(),g=a.createGain();o.type=wave;o.frequency.value=freq;
    const att=wave==='triangle'?0.03:0.008,rel=Math.max(att+0.02,dur*0.78);
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+att);g.gain.exponentialRampToValueAtTime(0.001,t+rel);
    if(cut){const f=a.createBiquadFilter();f.type='lowpass';f.frequency.value=cut;o.connect(f);f.connect(g);}else o.connect(g);
    g.connect(a.destination);o.start(t);o.stop(t+dur+0.03);}catch(e){}
}
function _tick(){
  _mt=null;if(muted||GS!=='play')return;
  const a=resumeAC();if(!a||a.state==='suspended'){if(a)a.resume().then(()=>{_mtime=a.currentTime+0.1;_mt=setTimeout(_tick,80);});else _mt=setTimeout(_tick,150);return;}
  const now=a.currentTime;
  if(_mtime<now)_mtime=now+0.06;
  const song=SONGS[_mlv],s16=60/song.bpm/4,nD=song.drums.length,nM=song.mel.length;
  while(_mtime<now+0.35){
    const i=_ms%nD,t=_mtime,dk=song.drums[i];
    if(dk>0)_drum(a,dk,t);
    const bf=song.bass[i];if(bf>0)_note(a,bf,0.22,'sawtooth',t,s16*1.6,500);
    if(i%8===0){const ci=Math.floor(i/8)%song.chords.length;song.chords[ci].forEach(f=>_note(a,f,0.048,'triangle',t,s16*7.2,1100));}
    const mf=song.mel[_ms%nM];if(mf>0)_note(a,mf,0.13,'square',t,s16*1.4,2600);
    _mtime+=s16;_ms++;
  }
  _mt=setTimeout(_tick,60);
}

let beeOsc=null,beeGain=null,beeLfo=null;
function startBuzz(){
  stopBuzz();if(muted)return;const a=resumeAC();if(!a)return;
  try{
    beeOsc=a.createOscillator();beeGain=a.createGain();beeLfo=a.createOscillator();
    const lg=a.createGain();beeLfo.frequency.value=7;lg.gain.value=10;beeLfo.connect(lg);lg.connect(beeOsc.frequency);
    beeOsc.type='sine';beeOsc.frequency.value=540;beeGain.gain.value=0.012;
    beeOsc.connect(beeGain);beeGain.connect(a.destination);beeLfo.start();beeOsc.start();
    const o2=a.createOscillator(),g2=a.createGain();o2.type='sine';o2.frequency.value=810;g2.gain.value=0.006;
    o2.connect(g2);g2.connect(a.destination);o2.start();beeGain._o2=o2;beeGain._g2=g2;
  }catch(e){}
}
function stopBuzz(){
  try{beeGain&&beeGain._o2&&beeGain._o2.stop();}catch(e){}
  try{beeGain&&beeGain._g2&&beeGain._g2.disconnect();}catch(e){}
  try{beeOsc&&beeOsc.stop();}catch(e){}
  try{beeLfo&&beeLfo.stop();}catch(e){}
  try{beeGain&&beeGain.disconnect();}catch(e){}
  beeOsc=beeGain=beeLfo=null;
}

// Weapons unlocked purely by fruit collected
// type: dust=homing sparkle  bomb=pink glitter explosion  slime=toxic arc  zap=chain lightning  vortex=spinning tornado
const WEAPONS=[
  {id:0,nm:'Fairy Dust',    e:'✨',c1:'#ffaaff',c2:'#ff66ee',type:'dust',  cd:350,dmg:1,spd:3.2, aoe:0  },

// unlock thresholds: fruits needed (no bee requirement — fruit = power-ups)
const WEP_UNLOCK=[0,3,7,12,18];

let beeRespawnCount=0,beeRespawnTimer=0,waveTimer=0,waveCount=0;

function checkWepUnlock(){
  let nw=0;
  for(let i=WEAPONS.length-1;i>=0;i--){
    if(totalFruit>=WEP_UNLOCK[i]){nw=i;break;}
  }
  if(nw>curWep){
    const prev=curWep;curWep=nw;
    sfx('wepup');
    const wn=$('wnew');$('wnewt').textContent=WEAPONS[curWep].e;$('wnewn').textContent=WEAPONS[curWep].nm+' unlocked!';
    wn.classList.add('on');setTimeout(()=>wn.classList.remove('on'),2200);
    updWepBar();
  }
}
function updWepBar(){
  const wb=$('wepbar');if(!wb)return;
  wb.innerHTML='';
  for(let i=0;i<=curWep;i++){
    const w=WEAPONS[i],d=document.createElement('div');
    d.className='wpi'+(i===curWep?' cur':'');
    d.textContent=w.e;wb.appendChild(d);
  }
}

function autoShoot(dt){
  if(GS!=='play'||muted&&false){}// always check
  wepCd=Math.max(0,wepCd-dt);
  if(wepCd>0)return;
  // gather targets
  let tgts=[];
  bees.forEach((b,i)=>tgts.push({type:'bee',i,x:b.x,y:b.y,d:D(PL.x,PL.y,b.x,b.y)}));
  snakes.forEach((s,i)=>{const h=s.segs[0];tgts.push({type:'snake',i,x:h.x,y:h.y,d:D(PL.x,PL.y,h.x,h.y)});});
  if(boss)tgts.push({type:'boss',i:0,x:boss.x,y:boss.y,d:D(PL.x,PL.y,boss.x,boss.y)});
  if(tgts.length===0)return;
  tgts.sort((a,b)=>a.d-b.d);
  const w=WEAPONS[curWep],wx=PL.x+14,wy=PL.y-8;
  wepCd=w.cd;
  sfx('wep'+w.id);
  const t=tgts[0];

  if(w.type==='bomb'){
    // GLITTER BOMB: flies toward enemy, explodes in huge pink glitter burst
    const dx=t.x-wx,dy=t.y-wy,dist=Math.sqrt(dx*dx+dy*dy)||1;
    shots.push({x:wx,y:wy,vx:dx/dist*w.spd*2.5,vy:dy/dist*w.spd*2.5-2,
      c1:w.c1,c2:w.c2,type:'bomb',life:2.0,aoe:w.aoe,dmg:w.dmg,tgt:t,rot:0,sz:14});

  } else if(w.type==='slime'){
    // TOXIC SLIME: arcs through air, splats in giant acid pool
    const dx=t.x-wx,dy=t.y-wy,dist=Math.sqrt(dx*dx+dy*dy)||1;
    shots.push({x:wx,y:wy,vx:dx/dist*w.spd*2.5,vy:dy/dist*w.spd*2.5-4,
      grav:0.28,c1:w.c1,c2:w.c2,type:'slime',life:2.8,aoe:w.aoe,dmg:w.dmg,sz:20,rot:0});

  } else if(w.type==='zap'){
    // LIGHTNING ZAP: instant chain — hits nearest, then arcs to next 2 enemies
    const chain=tgts.slice(0,3);
    chain.forEach((tg,ci)=>{
      const dx=tg.x-wx,dy=tg.y-wy,dist=Math.sqrt(dx*dx+dy*dy)||1;
      shots.push({x:wx,y:wy,vx:dx/dist*w.spd*2.5,vy:dy/dist*w.spd*2.5,
        c1:w.c1,c2:w.c2,type:'zap',life:1.0+ci*.2,pierce:false,dmg:w.dmg,rot:0,chain:ci});
    });

  } else if(w.type==='vortex'){
    // RAINBOW VORTEX: spinning tornado that pulls all enemies toward it then destroys
    const cx=W/2,cy=H*.4;
    shots.push({x:wx,y:wy,vx:(cx-wx)*.08,vy:(cy-wy)*.08,
      c1:w.c1,c2:w.c2,type:'vortex',life:2.5,aoe:w.aoe,dmg:w.dmg,sz:30,rot:0,pull:true});

  } else {
    // FAIRY DUST: homing sparkle
    const dx=t.x-wx,dy=t.y-wy,dist=Math.sqrt(dx*dx+dy*dy)||1;
    shots.push({x:wx,y:wy,vx:dx/dist*w.spd*2.5,vy:dy/dist*w.spd*2.5,
      c1:w.c1,c2:w.c2,type:'dust',life:2.2,dmg:1,tgt:t,rot:0});
  }
}

function bombExplode(s){
  // Pink glitter bomb explosion
  glitterBurst(s.x,s.y,s.c1,s.c2,20,true);
  for(let ring=0;ring<3;ring++){
    const r=s.aoe*(ring*.3+.4);
    for(let a=0;a<8;a++){const ang=a/8*Math.PI*2+ring*.4;
      parts.push({x:s.x,y:s.y,vx:Math.cos(ang)*r*.8,vy:Math.sin(ang)*r*.8-20,life:.8,ml:.8,col:ring%2===0?s.c1:s.c2,rad:rnd(3,8),glitter:true,rot:Math.random()*Math.PI*2,spin:(Math.random()-.5)*12});
    }
  }
  const beeCopy=[...bees.map((_,i)=>i)],snkCopy=[...snakes.map((_,i)=>i)];
  beeCopy.forEach(i=>{if(i<bees.length&&D(s.x,s.y,bees[i].x,bees[i].y)<s.aoe)killBee(i,s.x,s.y);});
  snkCopy.forEach(i=>{if(i<snakes.length&&D(s.x,s.y,snakes[i].segs[0].x,snakes[i].segs[0].y)<s.aoe)killSnake(i);});
  if(boss&&D(s.x,s.y,boss.x,boss.y)<s.aoe+30)hitBossWep(s.dmg);
  bees=bees.filter(b=>!b._dead);snakes=snakes.filter(s=>!s._dead);
}
function updateShots(dt){
  shots.forEach(s=>{
    // homing steers (dust + bomb)
    if((s.type==='dust'||s.type==='bomb')&&s.tgt){
      const ti=s.tgt.type==='bee'?bees[s.tgt.i]:s.tgt.type==='snake'?snakes[s.tgt.i]:boss;
      if(ti){
        const tx=ti.x||(ti.segs&&ti.segs[0].x)||0,ty=ti.y||(ti.segs&&ti.segs[0].y)||0;
        const dx=tx-s.x,dy=ty-s.y,d=Math.sqrt(dx*dx+dy*dy)||1;
        s.vx+=(dx/d*3.5-s.vx)*.04;s.vy+=(dy/d*3.5-s.vy)*.04;
        // bomb explodes on contact
        if(s.type==='bomb'&&d<30){bombExplode(s);s.life=0;return;}
      }
    }
    // slime + vortex gravity
    if(s.type==='slime')s.vy+=s.grav*(dt/16);
    if(s.type==='vortex'){
      // vortex floats to center of screen, grows, pulls enemies
      s.sz=Math.min(s.sz+dt*.04,s.aoe);
      s.vx*=.96;s.vy*=.96;
      if(s.pull){
        bees.forEach(b=>{const dx=s.x-b.x,dy=s.y-b.y,d=Math.sqrt(dx*dx+dy*dy)||1;if(d<s.sz*1.5){b.x+=dx/d*3*(dt/16);b.y+=dy/d*3*(dt/16);}});
        snakes.forEach(sn=>{const dx=s.x-sn.segs[0].x,dy=s.y-sn.segs[0].y,d=Math.sqrt(dx*dx+dy*dy)||1;if(d<s.sz*1.5){sn.segs[0].x+=dx/d*3*(dt/16);}});
      }
    }
    s.rot+=dt*.015;
    s.x+=s.vx*(dt/16);s.y+=s.vy*(dt/16);s.life-=dt*.001;
    // slime hits ground → splat
    if(s.type==='slime'&&s.y>H-GH()-8){
      splatBurst(s.x,s.y);
      const beeCopy=[...bees.map((_,i)=>i)],snkCopy=[...snakes.map((_,i)=>i)];
      beeCopy.forEach(i=>{if(i<bees.length&&D(s.x,s.y,bees[i].x,bees[i].y)<s.aoe)killBee(i,s.x,s.y);});
      snkCopy.forEach(i=>{if(i<snakes.length&&D(s.x,s.y,snakes[i].segs[0].x,snakes[i].segs[0].y)<s.aoe)killSnake(i);});
      if(boss&&D(s.x,s.y,boss.x,boss.y)<s.aoe+30)hitBossWep(s.dmg);
      bees=bees.filter(b=>!b._dead);snakes=snakes.filter(s2=>!s2._dead);
      s.life=0;
    }
    // vortex destroys enemies inside it
    if(s.type==='vortex'&&s.sz>40){
      bees.forEach((b,i)=>{if(D(s.x,s.y,b.x,b.y)<s.sz*.7)killBee(i,b.x,b.y);});
      snakes.forEach((sn,i)=>{if(D(s.x,s.y,sn.segs[0].x,sn.segs[0].y)<s.sz*.6)killSnake(i);});
      if(boss&&D(s.x,s.y,boss.x,boss.y)<s.sz*.5)hitBossWep(s.dmg*.3);
      bees=bees.filter(b=>!b._dead);snakes=snakes.filter(s2=>!s2._dead);
    }
  });
  shots=shots.filter(s=>s.life>0&&s.x>-50&&s.x<W+50&&s.y>-50&&s.y<H+50);

  // shot-enemy collisions
  shots.forEach(s=>{
    if(s._spent&&!s.pierce)return;
    // vs bees (reverse so splice is safe)
    for(let bi=bees.length-1;bi>=0;bi--){
      if(D(s.x,s.y,bees[bi].x,bees[bi].y)<22){
        killBee(bi,s.x,s.y);
        if(!s.pierce){s.life=0;return;}
        s._spent=true;
      }
    }
    // vs snakes
    for(let si=snakes.length-1;si>=0;si--){
      if(D(s.x,s.y,snakes[si].segs[0].x,snakes[si].segs[0].y)<20){
        killSnake(si);
        if(!s.pierce){s.life=0;return;}
        s._spent=true;
      }
    }
    // vs boss
    if(boss&&D(s.x,s.y,boss.x,boss.y)<55){
      hitBossWep(s.dmg);
      if(!s.pierce)s.life=0;
    }
  });
}

function killBee(i,x,y){
  if(i<0||i>=bees.length||bees[i]._dead)return;
  bees[i]._dead=true;
  beesKilled++;score+=15;
  glitterBurst(bees[i].x,bees[i].y,'#ffe066','#ff88ff',7);
  pop(bees[i].x,bees[i].y,'+15🐝','#ffe066');
  sfx('beekill');

function killSnake(i){

// ── Build level ───────────────────────────────────────────────
function buildLv(){
  const lv=LVS[LI],gh=GH();
  PL.x=80;PL.y=H-gh-PL.h/2-12;PL.tx=PL.x;PL.ty=PL.y;
  items=[];bees=[];snakes=[];parts=[];pops=[];rainD=[];stars=[];clouds=[];stompWaves=[];
  shots=[];wepCd=0;boss=null;collected=0;fruitGot=0;farmerOn=false;farmerT=0;beeRespawnCount=0;beeRespawnTimer=0;
  lvTimer=0;lvDur=lv.dur||45000;lvMinDur=lv.minDur||30000;waveTimer=lv.waveEvery||12000;waveCount=0;
  total=lv.items.reduce((s,g)=>s+g.n,0);
  const mg=50,top=H*.1,bot=H-gh-38;
  lv.items.forEach(g=>{
    for(let i=0;i<g.n;i++){
      let ok=false,tr=0;
      while(!ok&&tr<60){
        const x=mg+Math.random()*(W-mg*2),y=top+Math.random()*(bot-top);
        if(!items.some(it=>D(it.x,it.y,x,y)<52)){items.push({t:g.t,x,y,col:false,bob:Math.random()*Math.PI*2});ok=true;}
        tr++;
      }
    }
  });
  for(let i=0;i<lv.bees;i++){
    const sx=Math.random()<.5;
    bees.push({x:sx?-30:W+30,y:H*.1+Math.random()*H*.65,vx:(sx?1:-1)*lv.bs*(.8+Math.random()*.4),vy:(Math.random()-.5)*lv.bs,pat:lv.bp,t:Math.random()*100,by:0,wa:0,angry:false,ghost:false});
    bees[bees.length-1].by=bees[bees.length-1].y;
  }
  for(let i=0;i<(lv.ghostBees||0);i++){
    const sx=Math.random()<.5;
    bees.push({x:sx?-30:W+30,y:H*.1+Math.random()*H*.6,vx:(sx?1:-1)*lv.bs*1.2,vy:(Math.random()-.5)*lv.bs,pat:'random',t:Math.random()*100,by:0,wa:0,angry:false,ghost:true});
    bees[bees.length-1].by=bees[bees.length-1].y;
  }
  for(let i=0;i<(lv.snk||0);i++){
    const sx=Math.random()*W,dir=Math.random()<.5?1:-1,segs=[];
    for(let s=0;s<14;s++)segs.push({x:sx-s*8*dir,y:H-gh+14});
    snakes.push({segs,vx:dir*lv.ss*(.8+Math.random()*.4),gy:H-gh+14,t:0});
  }
  for(let i=0;i<7;i++)clouds.push({x:Math.random()*W,y:20+Math.random()*(H*.22),s:.6+Math.random()*.8,vx:.15+Math.random()*.2});
  if(lv.night)for(let i=0;i<(lv.stars||35);i++)stars.push({x:Math.random()*W,y:Math.random()*(H*.6),r:.8+Math.random()*2,t:Math.random()*Math.PI*2});
  if(lv.rain)for(let i=0;i<70;i++)rainD.push({x:Math.random()*W,y:Math.random()*H,vy:6+Math.random()*4,len:12});
  if(lv.bearBoss)spawnBoss(gh);
  $('lce').textContent=['🌻','🍎','🌈','⭐','🏆'][LI]||'🌟';
  $('nxbtn').textContent=LI>=LVS.length-1?'🏆 Finish!':'Next Level ➡️';
  updHUD();updWepBar();
}

// ── Boss ──────────────────────────────────────────────────────
function spawnBoss(gh){
  bossMaxHp=15;bossHp=15;bossHitCool=0;
  boss={x:W/2,y:H-gh-70,vx:1.3,vy:0,t:0,angry:false,charge:false,chargeT:0,stompT:0};
  setTimeout(()=>sfx('bosshit'),500);
}
function updateBoss(dt){
  if(!boss)return;
  boss.t+=dt*.001;bossHitCool=Math.max(0,bossHitCool-dt);
  if(bossHp<=10&&bossHp>5&&boss.vx<2.2)boss.vx*=1.4;
  if(bossHp<=5&&boss.vx<3.5)boss.vx*=1.3;
  boss.chargeT+=dt;
  if(boss.chargeT>3500){boss.chargeT=0;boss.charge=true;boss.angry=true;setTimeout(()=>{if(boss){boss.charge=false;boss.angry=false;}},900);}
  if(boss.charge){const dx=PL.x-boss.x,dy=PL.y-boss.y,d=Math.sqrt(dx*dx+dy*dy)||1;boss.x+=dx/d*5*(dt/16);boss.y+=dy/d*5*(dt/16);}
  else{boss.x+=boss.vx*(dt/16);boss.y=H-GH()-70+Math.sin(boss.t*1.5)*35;if(boss.x<60||boss.x>W-60)boss.vx*=-1;}
  boss.stompT+=dt;
  if(boss.stompT>3200){boss.stompT=0;stompWaves.push({x:boss.x,y:boss.y,r:10,alpha:1});}
  if(bossHitCool<=0&&D(PL.x,PL.y,boss.x,boss.y)<52){bossHitCool=1400;hitPlayer();}
  updHUD();
}

// ── Particles ─────────────────────────────────────────────────
function glitterBurst(x,y,c1,c2,n,big){
  const space=200-parts.length,cnt=Math.min(n||8,Math.max(0,space));
  for(let i=0;i<cnt;i++){
    const a=rnd(0,Math.PI*2),s=rnd(big?90:50,big?200:140);
    const isGlit=Math.random()>.35;
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:big?1.5:.9,ml:big?1.5:.9,
      col:Math.random()>.5?c1:c2,rad:rnd(isGlit?1.5:3,isGlit?4:8),glitter:isGlit,rot:Math.random()*Math.PI*2,spin:(Math.random()-.5)*14});
  }
}
function splatBurst(x,y){
  const cols=['#88ff44','#aaffcc','#ee44ff','#ff88cc','#ccff44'];
  for(let i=0;i<14;i++){
    const a=rnd(0,Math.PI*2),s=rnd(25,110);
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-25,life:.7,ml:.7,col:cols[i%cols.length],rad:rnd(3,10),slime:true});
  }
}
function burst(x,y,col,n,big){
  const space=200-parts.length,cnt=Math.min(n||6,Math.max(0,space));
  for(let i=0;i<cnt;i++){const a=rnd(0,Math.PI*2),s=rnd(big?80:45,big?180:120);parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:big?1.4:.9,ml:big?1.4:.9,col,rad:rnd(big?4:2,big?9:5)});}
}
function pop(x,y,txt,col){pops.push({x,y,t:txt,col,life:.9,vy:-90});}

// ── Movement ──────────────────────────────────────────────────
function moveBee(b,dt){
  b.t+=dt*.001;b.wa+=dt*.022;
  if(b.pat==='linear'){b.x+=b.vx*(dt/16);if(b.x<-40)b.x=W+40;if(b.x>W+40)b.x=-40;b.y+=Math.sin(b.t*2)*.4;}
  else if(b.pat==='patrol'){b.x+=b.vx*(dt/16);if(b.x>W-30||b.x<30){b.vx*=-1;b.y+=30;}b.y=Math.max(50,Math.min(H*.75,b.y));}
  else if(b.pat==='random'){b.x+=b.vx*(dt/16);b.y+=b.vy*(dt/16);if(b.x<10||b.x>W-10)b.vx*=-1;if(b.y<40||b.y>H*.8)b.vy*=-1;if(Math.random()<.009){b.vx+=(Math.random()-.5)*.9;b.vy+=(Math.random()-.5)*.9;}const lv=LVS[LI];b.vx=cl(b.vx,-lv.bs*1.5,lv.bs*1.5);b.vy=cl(b.vy,-lv.bs*1.5,lv.bs*1.5);}
  else if(b.pat==='zigzag'){b.x+=b.vx*(dt/16);b.y=b.by+Math.sin(b.t*3)*65;if(b.x<-40){b.x=W+40;b.by=H*.1+Math.random()*H*.65;}if(b.x>W+40){b.x=-40;b.by=H*.1+Math.random()*H*.65;}}
  else if(b.pat==='swirl'){b.x=W/2+Math.cos(b.t*.8)*120;b.y=H*.42+Math.sin(b.t*.8)*80;}
}
function moveSnake(s,dt){
  s.t+=dt*.001;const hd=s.segs[0];
  if(hd.x+s.vx*(dt/16)<20||hd.x+s.vx*(dt/16)>W-20)s.vx*=-1;
  for(let i=s.segs.length-1;i>0;i--){s.segs[i].x=s.segs[i-1].x;s.segs[i].y=s.segs[i-1].y;}
  s.segs[0].x+=s.vx*(dt/16);s.segs[0].y=s.gy+Math.sin(s.t*4)*3;
}
function hitPlayer(){
  if(inv)return;
  burst(PL.x,PL.y,'#ff8800',8);pop(PL.x,PL.y,'-1 Life!','#ff4444');
  lives--;updHUD();inv=true;invT=1200;stingFlash();sfx('sting');
  if(lives<=0)endGame();
}
function endGame(){GS='over';stopBuzz();stopMusic();setTimeout(()=>{sfx('over');showScr('gos');},300);}
function checkWinCondition(){
  if(GS!=='play')return;
  const allBeesGone=bees.filter(b=>!b._dead).length===0;
  const allSnakesGone=snakes.filter(s=>!s._dead).length===0;
  const bossGone=!boss||bossHp<=0;
  // Must survive minimum time AND clear all current enemies
  const minDone=lvTimer>=lvMinDur;
  if(allBeesGone&&allSnakesGone&&bossGone&&minDone)finishLevel();
}
function finishLevel(){GS='lc';stopBuzz();stopMusic();setTimeout(()=>{sfx('lc');$('lcsub').textContent='Level '+(LI+1)+' done! +'+(total*10)+' pts';score+=total*10;showScr('lcs');},200);}

// ── Main loop ─────────────────────────────────────────────────
function loop(ts){
  if(GS!=='play'){raf=requestAnimationFrame(loop);return;}
  const dt=Math.min(ts-last,50);last=ts;
  const lv=LVS[LI],gh=GH();
  // player move
  const dx=PL.tx-PL.x,dy=PL.ty-PL.y,dd=Math.sqrt(dx*dx+dy*dy);
  if(dd>2){PL.x+=dx/dd*Math.min(PL.spd*(dt/16),dd);PL.y+=dy/dd*Math.min(PL.spd*(dt/16),dd);}
  PL.x=cl(PL.x,PL.w/2,W-PL.w/2);PL.y=cl(PL.y,PL.h/2,H-gh-PL.h/2-5);
  PL.ft+=dt;if(PL.ft>180){PL.f++;PL.ft=0;}
  if(inv){invT-=dt;if(invT<=0)inv=false;}
  if(comboT>0){comboT-=dt;if(comboT<=0)combo=0;}
  // level timer
  lvTimer+=dt;
  // Timer bar shows progress toward minimum duration
  if(lvTimer>=lvMinDur&&bees.filter(b=>!b._dead).length===0&&snakes.filter(s=>!s._dead).length===0&&(!boss||bossHp<=0)){
    finishLevel();
  }
  // Hard cap: if taking way too long, nudge with time warning but no penalty
  if(lvTimer>lvDur+15000){
    pop(W/2,H*.28,'⏰ Almost done!','#ffaa00');lvTimer=lvDur+5000;
  }
  // farmer magnet
  if(farmerOn){
    farmerT-=dt;
    if(farmerT<=0){farmerOn=false;$('fbar').classList.remove('on');}
    else{items.forEach(it=>{if(!it.col){const id=D(PL.x,PL.y,it.x,it.y);if(id<FR){const p=.04*(dt/16);it.x+=(PL.x-it.x)*p;it.y+=(PL.y-it.y)*p;}}});$('fff').style.width=(farmerT/FDUR*100)+'%';}
  }
  // wind
  if(lv.wind)items.forEach(it=>{if(!it.col){it.x+=lv.wind*(dt/16);if(it.x>W-20)it.x=22;}});
  // auto shoot
  autoShoot(dt);
  // boss
  if(boss)updateBoss(dt);
  bees.forEach(b=>moveBee(b,dt));snakes.forEach(s=>moveSnake(s,dt));
  // purge dead
  bees=bees.filter(b=>!b._dead);snakes=snakes.filter(s=>!s._dead);
  // Continuous wave spawning — keep pressure on throughout the level
  const lv2=LVS[LI];
  const timeLeft=lvMinDur-lvTimer;
  // Spawn new wave every N seconds while timer hasn't hit minimum
  if(timeLeft>0){
    waveTimer-=dt;
    const activeBees=bees.filter(b=>!b._dead).length;
    if(waveTimer<=0||(activeBees===0&&timeLeft>3000)){
      waveTimer=lv2.waveEvery||10000;
      waveCount++;
      // Number of bees in wave scales with wave number
      const waveSz=Math.min(2+Math.floor(waveCount/2),lv2.bees);
      for(let i=0;i<waveSz;i++){
        const sx=Math.random()<.5;
        const isGhost=lv2.ghostBees&&Math.random()<.3&&waveCount>1;
        bees.push({x:sx?-40:W+40,y:H*.08+Math.random()*H*.6,
          vx:(sx?1:-1)*lv2.bs*(0.85+Math.random()*.35),
          vy:(Math.random()-.5)*lv2.bs,
          pat:lv2.bp,t:Math.random()*100,by:0,wa:0,angry:false,ghost:isGhost});
        bees[bees.length-1].by=bees[bees.length-1].y;
      }
      if(waveCount===1&&activeBees===0){/* silent first spawn */}
      else{pop(W/2,H*.28,'🐝 Wave '+(waveCount+1)+'!','#ffaa00');}
    }
  }
  // shot updates
  updateShots(dt);
  // bee/snake hit player
  if(!inv){
    bees.forEach(b=>{if(!b.ghost&&D(PL.x,PL.y,b.x,b.y)<26){b.angry=true;setTimeout(()=>{if(b)b.angry=false;},600);combo=0;hitPlayer();}});
    bees.forEach(b=>{if(b.ghost&&D(PL.x,PL.y,b.x,b.y)<22){b.angry=true;setTimeout(()=>{if(b)b.angry=false;},600);hitPlayer();}});
    snakes.forEach(s=>{if(D(PL.x,PL.y,s.segs[0].x,s.segs[0].y)<24){sfx('snake');hitPlayer();}});
  }
  // items
  items.forEach(it=>{
    if(it.col)return;
    it.bob+=dt*.004;
    if(D(PL.x,PL.y,it.x,it.y)<32){
      it.col=true;collected++;score+=10;
      const isFr=FRUITS.has(it.t);
      if(isFr){fruitGot++;totalFruit++;}
      combo++;comboT=1400;
      if(combo>=3){sfx('combo');score+=5;glitterBurst(it.x,it.y,'#ffe066','#ff88ff',7);}
      else sfx(it.t==='orange'?'orange':isFr?'fruit':'flower');
      if(isFr){glitterBurst(it.x,it.y,'#ff44bb','#ffe066',10,false);pop(it.x,it.y,'🍓 +POWER!','#ff44bb');}
      else{glitterBurst(it.x,it.y,'#88ffcc','#ffe066',5);pop(it.x,it.y,'+10','#ffe066');}
      if(!farmerOn&&fruitGot>=FNEED){farmerOn=true;farmerT=FDUR;sfx('farmer');show('fbar');$('fbar').classList.add('on');}
      checkWepUnlock();updHUD();
      checkWinCondition();
    }
  });
  checkWinCondition();
  // respawn (level 2)
  if(lv.respawn&&items.length>0&&items.every(i=>i.col)&&collected<total*(lv.respawn+1)){
    const gh2=GH(),mg2=50,top2=H*.1,bot2=H-gh2-38;
    lv.items.forEach(g=>{
      for(let i=0;i<Math.ceil(g.n/2);i++){
        let ok=false,tr=0;
        while(!ok&&tr<30){
          const x=mg2+Math.random()*(W-mg2*2),y=top2+Math.random()*(bot2-top2);
          if(!items.some(it=>!it.col&&D(it.x,it.y,x,y)<48)){items.push({t:g.t,x,y,col:false,bob:Math.random()*Math.PI*2});ok=true;}
          tr++;
        }
      }
    });
    total+=Math.ceil(lv.items.reduce((s,g)=>s+g.n,0)/2);
    updHUD();
  }
  // weather
  if(lv.rain)rainD.forEach(r=>{r.y+=r.vy*(dt/16);if(r.y>H){r.y=-10;r.x=Math.random()*W;}});
  clouds.forEach(c=>{c.x+=c.vx*(dt/16);if(c.x>W+80)c.x=-80;});
  stars.forEach(s=>s.t+=dt*.003);
  parts.forEach(p=>{p.x+=p.vx*(dt/16);p.y+=p.vy*(dt/16);p.vy+=.09*(dt/16);p.life-=dt*.001;});
  parts=parts.filter(p=>p.life>0);if(parts.length>200)parts=parts.slice(-200);
  pops.forEach(p=>{p.y+=p.vy*(dt/16);p.life-=dt*.001;});pops=pops.filter(p=>p.life>0);
  stompWaves.forEach(w=>{w.r+=dt*.14;w.alpha-=dt*.0016;});stompWaves=stompWaves.filter(w=>w.alpha>0);
  draw(dt);
  raf=requestAnimationFrame(loop);
}

// ── Draw ──────────────────────────────────────────────────────
function draw(dt){
  scaleCtx();ctx.clearRect(0,0,W,H);
  const lv=LVS[LI],gh=GH();
  // sky
  const sg=ctx.createLinearGradient(0,0,0,H-gh);sg.addColorStop(0,lv.bgT);sg.addColorStop(1,lv.bgB);
  ctx.fillStyle=sg;ctx.fillRect(0,0,W,H-gh);
  // stars
  if(lv.night)stars.forEach(s=>{ctx.save();ctx.globalAlpha=.5+Math.sin(s.t)*.5;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle='#fffde0';ctx.fill();ctx.restore();});
  // clouds
  ctx.fillStyle='rgba(255,255,255,.75)';
  clouds.forEach(c=>{const sc=c.s;ctx.beginPath();ctx.arc(c.x,c.y,22*sc,0,Math.PI*2);ctx.arc(c.x+28*sc,c.y+6*sc,18*sc,0,Math.PI*2);ctx.arc(c.x-20*sc,c.y+8*sc,16*sc,0,Math.PI*2);ctx.arc(c.x+8*sc,c.y-10*sc,16*sc,0,Math.PI*2);ctx.fill();});
  // rain
  if(lv.rain){ctx.save();ctx.strokeStyle='rgba(150,200,255,.5)';ctx.lineWidth=1.5;rainD.forEach(r=>{ctx.beginPath();ctx.moveTo(r.x,r.y);ctx.lineTo(r.x-2,r.y+(r.len||12));ctx.stroke();});ctx.restore();}
  // ground
  ctx.fillStyle=lv.gc;ctx.fillRect(0,H-gh,W,gh);
  ctx.fillStyle=lv.gr;ctx.fillRect(0,H-gh,W,18);
  for(let i=0;i<W;i+=22){const h2=10+Math.sin(i*.3)*4;ctx.fillStyle=lv.gr;ctx.beginPath();ctx.moveTo(i,H-gh+4);ctx.quadraticCurveTo(i+5,H-gh-h2,i+10,H-gh+4);ctx.fill();}
  // items
  items.forEach(it=>{if(!it.col){const by=Math.sin(it.bob)*4;drawEmoji(EMJ[it.t],it.x,it.y+by,36);}});
  // snakes
  snakes.forEach(s=>drawSnake(s));
  // bees (ghost = fade by distance)
  bees.forEach(b=>{
    if(b.ghost){const dist=D(PL.x,PL.y,b.x,b.y),alpha=Math.max(0,Math.min(1,(130-dist)/90));ctx.save();ctx.globalAlpha=alpha;drawBee(b);ctx.restore();}
    else drawBee(b);
  });
  // boss
  if(boss)drawBoss();
  // stomp waves
  stompWaves.forEach(w=>{ctx.save();ctx.globalAlpha=w.alpha*.5;ctx.strokeStyle='#ff6600';ctx.lineWidth=4;ctx.beginPath();ctx.arc(w.x,w.y,w.r,0,Math.PI*2);ctx.stroke();ctx.restore();});
  // particles
  parts.forEach(p=>{
    ctx.save();ctx.globalAlpha=Math.max(0,p.life/p.ml);ctx.fillStyle=p.col;
    if(p.glitter){ctx.translate(p.x,p.y);ctx.rotate((p.rot||0)+(p.spin||0)*(1-p.life/p.ml)*5);ctx.beginPath();ctx.moveTo(0,-p.rad*1.8);ctx.lineTo(p.rad*.7,0);ctx.lineTo(0,p.rad*1.8);ctx.lineTo(-p.rad*.7,0);ctx.closePath();ctx.fill();}
    else if(p.slime){ctx.beginPath();ctx.ellipse(p.x,p.y,p.rad,p.rad*1.3,0,0,Math.PI*2);ctx.fill();}
    else{ctx.beginPath();ctx.arc(p.x,p.y,p.rad,0,Math.PI*2);ctx.fill();}
    ctx.restore();
  });
  // pops
  pops.forEach(p=>{ctx.save();ctx.globalAlpha=Math.min(1,p.life/.4);ctx.fillStyle=p.col||'#fff';ctx.font='bold 15px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(p.t,p.x,p.y);ctx.restore();});
  // shots
  shots.forEach(s=>{
    const fa=Math.min(1,s.life/.3);
    ctx.save();ctx.globalAlpha=fa;

    if(s.type==='dust'){
      // ✨ Fairy Dust — homing sparkle with glitter tail
      ctx.save();ctx.translate(s.x,s.y);ctx.rotate(s.rot||0);
      const g1=ctx.createRadialGradient(0,0,0,0,0,14);g1.addColorStop(0,'rgba(255,180,255,1)');g1.addColorStop(.5,s.c1);g1.addColorStop(1,'rgba(255,100,255,0)');
      ctx.fillStyle=g1;ctx.beginPath();ctx.arc(0,0,14,0,Math.PI*2);ctx.fill();
      ctx.font='14px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('✨',0,0);
      ctx.restore();
      if(Math.random()>.45){const ang=Math.random()*Math.PI*2;parts.push({x:s.x+rnd(-3,3),y:s.y+rnd(-3,3),vx:Math.cos(ang)*30,vy:Math.sin(ang)*30,life:.3,ml:.3,col:Math.random()>.5?s.c1:s.c2,rad:rnd(1.5,3.5),glitter:true,rot:Math.random()*Math.PI*2,spin:(Math.random()-.5)*10});}

    } else if(s.type==='bomb'){
      // 💥 Glitter Bomb — growing pulsing pink orb
      const sz=s.sz||14,pulse=1+Math.sin((s.rot||0)*8)*.15;
      ctx.save();ctx.translate(s.x,s.y);
      const gb=ctx.createRadialGradient(0,0,0,0,0,sz*pulse*1.4);
      gb.addColorStop(0,'rgba(255,255,255,.95)');gb.addColorStop(.3,s.c1);gb.addColorStop(.7,s.c2);gb.addColorStop(1,'rgba(255,80,180,0)');
      ctx.fillStyle=gb;ctx.beginPath();ctx.arc(0,0,sz*pulse*1.4,0,Math.PI*2);ctx.fill();
      // sparkle spikes
      for(let i=0;i<6;i++){const a=i/6*Math.PI*2+(s.rot||0);ctx.strokeStyle='rgba(255,220,255,.8)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(Math.cos(a)*sz*.4,Math.sin(a)*sz*.4);ctx.lineTo(Math.cos(a)*sz*1.8*pulse,Math.sin(a)*sz*1.8*pulse);ctx.stroke();}
      ctx.font='16px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('💥',0,0);
      ctx.restore();
      if(Math.random()>.35){const ang=Math.random()*Math.PI*2;parts.push({x:s.x,y:s.y,vx:Math.cos(ang)*55,vy:Math.sin(ang)*55,life:.4,ml:.4,col:Math.random()>.5?s.c1:s.c2,rad:rnd(2,5),glitter:true,rot:Math.random()*Math.PI*2,spin:12});}

    } else if(s.type==='slime'){
      // ☢️ Toxic Slime — wobbling green-purple blob
      const sz=s.sz||20,wb=1+Math.sin((s.rot||0)*15)*.25;
      ctx.save();ctx.translate(s.x,s.y);ctx.scale(wb,2-wb);
      const gs=ctx.createRadialGradient(0,0,0,0,0,sz);
      gs.addColorStop(0,'rgba(200,255,80,1)');gs.addColorStop(.45,'rgba(80,255,40,.85)');gs.addColorStop(.8,'rgba(100,0,200,.5)');gs.addColorStop(1,'rgba(50,0,100,0)');
      ctx.fillStyle=gs;ctx.beginPath();ctx.arc(0,0,sz,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(180,0,255,.5)';ctx.beginPath();ctx.arc(sz*.3,-sz*.2,sz*.35,0,Math.PI*2);ctx.fill();
      ctx.font='20px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('☢️',0,0);
      ctx.restore();
      if(Math.random()>.55)parts.push({x:s.x+rnd(-10,10),y:s.y+rnd(-6,10),vx:rnd(-20,20),vy:rnd(-10,15),life:.3,ml:.3,col:Math.random()>.5?'#44ff44':'#aa00ff',rad:rnd(3,7),slime:true});

    } else if(s.type==='zap'){
      // ⚡ Lightning Zap — jagged electric bolt
      const chainCols=['#ffffff','#88eeff','#ffff44'];
      ctx.strokeStyle=chainCols[s.chain||0];ctx.lineWidth=4-((s.chain||0));ctx.lineCap='round';
      // Jagged bolt from origin
      const steps=8;
      ctx.beginPath();ctx.moveTo(s.x-s.vx*.5,s.y-s.vy*.5);
      for(let i=1;i<=steps;i++){
        const px=s.x-s.vx*(1-i/steps),py=s.y-s.vy*(1-i/steps);
        ctx.lineTo(px+rnd(-8,8),py+rnd(-8,8));
      }
      ctx.stroke();
      // Glow
      ctx.shadowColor=chainCols[s.chain||0];ctx.shadowBlur=15;ctx.globalAlpha=fa*.6;ctx.lineWidth=8;ctx.stroke();
      ctx.shadowBlur=0;ctx.globalAlpha=fa;
      ctx.font='14px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('⚡',s.x,s.y);
      if(Math.random()>.5)parts.push({x:s.x+rnd(-6,6),y:s.y+rnd(-6,6),vx:rnd(-30,30),vy:rnd(-30,30),life:.2,ml:.2,col:'#88eeff',rad:rnd(1,3),glitter:true,rot:0,spin:0});

    } else if(s.type==='vortex'){
      // 🌀 Rainbow Vortex — expanding spinning tornado
      const sz=s.sz||30,rings=5;
      ctx.save();ctx.translate(s.x,s.y);
      const vortColors=['#ff44ff','#ff8800','#ffff00','#44ffaa','#4488ff','#aa44ff'];
      for(let ri=0;ri<rings;ri++){
        const r=sz*(ri+1)/rings,rot2=(s.rot||0)*(rings-ri)*.8+ri;
        ctx.save();ctx.rotate(rot2);
        const gr=ctx.createRadialGradient(0,0,r*.3,0,0,r);
        gr.addColorStop(0,'rgba(255,255,255,0)');gr.addColorStop(.6,vortColors[ri%vortColors.length].replace(')',', .4)').replace('rgb','rgba'));gr.addColorStop(1,'rgba(255,255,255,0)');
        ctx.strokeStyle=vortColors[ri%vortColors.length];ctx.lineWidth=3;ctx.globalAlpha=fa*.7;
        ctx.beginPath();for(let a2=0;a2<Math.PI*2;a2+=.15){ctx.lineTo(Math.cos(a2)*r+Math.sin(a2*3)*6,Math.sin(a2)*r+Math.cos(a2*3)*6);}ctx.closePath();ctx.stroke();
        ctx.restore();
      }
      ctx.font=Math.floor(sz*.8)+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🌀',0,0);
      ctx.restore();
      // constant particle spray
      if(Math.random()>.3){const ang=Math.random()*Math.PI*2,r2=sz*(.4+Math.random()*.6);parts.push({x:s.x+Math.cos(ang)*r2,y:s.y+Math.sin(ang)*r2,vx:Math.cos(ang+Math.PI/2)*40,vy:Math.sin(ang+Math.PI/2)*40,life:.5,ml:.5,col:vortColors[Math.floor(Math.random()*vortColors.length)],rad:rnd(2,5),glitter:true,rot:Math.random()*Math.PI*2,spin:10});}
    }
    ctx.restore();
  });
  // fairy + farmer
  if(farmerOn)drawFarmer(PL.x,PL.y);
  drawFairy(PL.x,PL.y,PL.f,inv);
  // magnet ring
  if(farmerOn){ctx.save();ctx.globalAlpha=.1+Math.sin(Date.now()*.005)*.07;ctx.strokeStyle='#ffe066';ctx.lineWidth=3;ctx.beginPath();ctx.arc(PL.x,PL.y,FR,0,Math.PI*2);ctx.stroke();ctx.restore();}
}

function drawEmoji(e,x,y,sz){ctx.save();ctx.font=sz+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(e,x,y);ctx.restore();}

function drawFairy(x,y,fr,iv){
  if(iv&&Math.floor(Date.now()/80)%2===0)return;
  ctx.save();
  const bob=Math.sin(fr*.28)*2.5,yy=y+bob;
  ctx.beginPath();ctx.ellipse(x,y+22,13,4,0,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,.17)';ctx.fill();
  const wf=Math.sin(fr*.45)*.16;
  [[1,-8,18,10,-0.55,'rgba(255,80,150,.58)','rgba(255,190,50,.45)'],[1,5,12,7,.4,'rgba(100,170,255,.55)','rgba(190,80,255,.45)'],[-1,-8,18,10,-0.55,'rgba(255,80,150,.58)','rgba(255,190,50,.45)'],[-1,5,12,7,.4,'rgba(100,170,255,.55)','rgba(190,80,255,.45)']].forEach(([sx,ey,rx,ry,ang,c1,c2])=>{
    ctx.save();ctx.translate(x,yy-10);ctx.scale(sx,1);ctx.save();ctx.rotate(wf*(ey<0?-1:1));
    ctx.beginPath();ctx.ellipse(rx,ey,rx,ry,ang,0,Math.PI*2);
    const wg=ctx.createLinearGradient(0,-20,28,10);wg.addColorStop(0,c1);wg.addColorStop(1,c2);
    ctx.fillStyle=wg;ctx.fill();ctx.restore();ctx.restore();
  });
  ctx.save();ctx.translate(x,yy+16);ctx.strokeStyle='#f4c2a1';ctx.lineWidth=3.5;ctx.lineCap='round';
  const ls=Math.sin(fr*.3)*5;
  ctx.beginPath();ctx.moveTo(-4,0);ctx.lineTo(-5+ls,14);ctx.stroke();
  ctx.beginPath();ctx.moveTo(4,0);ctx.lineTo(5-ls,14);ctx.stroke();
  ctx.fillStyle='#c4005e';ctx.beginPath();ctx.ellipse(-5+ls,15,4,3,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(5-ls,15,4,3,0,0,Math.PI*2);ctx.fill();ctx.restore();
  ctx.save();ctx.translate(x,yy);
  const dg=ctx.createLinearGradient(0,-4,0,20);dg.addColorStop(0,'#ff85c2');dg.addColorStop(1,'#ff3d9a');
  ctx.beginPath();ctx.moveTo(-7,0);ctx.quadraticCurveTo(-11,9,-13,20);ctx.lineTo(13,20);ctx.quadraticCurveTo(11,9,7,0);ctx.closePath();ctx.fillStyle=dg;ctx.fill();ctx.restore();
  ctx.save();ctx.translate(x,yy);ctx.strokeStyle='#f4c2a1';ctx.lineWidth=3.2;ctx.lineCap='round';
  const as=Math.sin(fr*.3+1)*4;
  ctx.beginPath();ctx.moveTo(-6,1);ctx.quadraticCurveTo(-16,6,-14+as,13);ctx.stroke();
  ctx.beginPath();ctx.moveTo(6,1);ctx.quadraticCurveTo(16,6,14-as,13);ctx.stroke();ctx.restore();
  ctx.save();ctx.translate(x,yy-16);
  ctx.fillStyle='#f4c2a1';ctx.fillRect(-2.5,8,5,7);
  ctx.beginPath();ctx.ellipse(0,0,9,10,0,0,Math.PI*2);ctx.fillStyle='#fde0c8';ctx.fill();
  ctx.fillStyle='#c8860a';ctx.beginPath();ctx.ellipse(0,-7,10,7,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(-10,1,4,7,-.3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(10,1,4,7,.3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#3d2000';ctx.beginPath();ctx.ellipse(-3.5,-1,2,2.5,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(3.5,-1,2,2.5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-2.8,-2,.85,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(4.2,-2,.85,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=.36;ctx.fillStyle='#ff9db0';ctx.beginPath();ctx.ellipse(-6,2,3.5,2,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(6,2,3.5,2,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
  ctx.strokeStyle='#c8607a';ctx.lineWidth=1.3;ctx.lineCap='round';ctx.beginPath();ctx.arc(0,3,3.5,.2,Math.PI-.2);ctx.stroke();
  ctx.fillStyle='#ff4da6';ctx.beginPath();ctx.ellipse(-5,-14,5,3,-.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(5,-14,5,3,.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ff85c2';ctx.beginPath();ctx.arc(0,-14,3,0,Math.PI*2);ctx.fill();ctx.restore();
  ctx.save();ctx.translate(x+14,yy-8);ctx.strokeStyle='#d4a0ff';ctx.lineWidth=1.8;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-7,14);ctx.stroke();
  ctx.globalAlpha=.6+Math.sin(fr*.6)*.4;ctx.font='11px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#ffe066';ctx.fillText('✦',0,0);ctx.restore();
  ctx.restore();
}

function drawBee(b){
  ctx.save();ctx.translate(b.x,b.y);
  ctx.save();ctx.rotate(Math.sin(b.wa)*.5);ctx.globalAlpha=.7;ctx.beginPath();ctx.ellipse(-7,-8,10,6,-.5,0,Math.PI*2);ctx.fillStyle='#e0f7ff';ctx.fill();ctx.restore();
  ctx.save();ctx.scale(-1,1);ctx.rotate(Math.sin(b.wa)*.5);ctx.globalAlpha=.7;ctx.beginPath();ctx.ellipse(-7,-8,10,6,-.5,0,Math.PI*2);ctx.fillStyle='#e0f7ff';ctx.fill();ctx.restore();
  ctx.globalAlpha=1;drawEmoji(b.angry?'😡':'🐝',0,0,32);ctx.restore();
}

function drawSnake(s){
  ctx.save();
  for(let i=s.segs.length-1;i>=0;i--){const sg=s.segs[i],t=i/s.segs.length,r=Math.max(2,5.5-t*3);ctx.beginPath();ctx.arc(sg.x,sg.y,r,0,Math.PI*2);ctx.fillStyle=i===0?'#256600':i%2===0?'#3aaa00':'#4dc400';ctx.fill();}
  const hd=s.segs[0],ang=s.vx>0?0:Math.PI;
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(hd.x+Math.cos(ang-.5)*3.5,hd.y+Math.sin(ang-.5)*3.5,1.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(hd.x+Math.cos(ang+.5)*3.5,hd.y+Math.sin(ang+.5)*3.5,1.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#111';ctx.beginPath();ctx.arc(hd.x+Math.cos(ang-.5)*3.5,hd.y+Math.sin(ang-.5)*3.5,.7,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(hd.x+Math.cos(ang+.5)*3.5,hd.y+Math.sin(ang+.5)*3.5,.7,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#ff4466';ctx.lineWidth=1.2;ctx.lineCap='round';
  if(Math.floor(Date.now()/250)%4!==0){const tx=hd.x+Math.cos(ang)*6,ty=hd.y+Math.sin(ang)*6;ctx.beginPath();ctx.moveTo(hd.x+Math.cos(ang)*4,hd.y+Math.sin(ang)*4);ctx.lineTo(tx+Math.cos(ang-1)*4,ty+Math.sin(ang-1)*4);ctx.stroke();ctx.beginPath();ctx.moveTo(hd.x+Math.cos(ang)*4,hd.y+Math.sin(ang)*4);ctx.lineTo(tx+Math.cos(ang+1)*4,ty+Math.sin(ang+1)*4);ctx.stroke();}
  ctx.restore();
}

function drawFarmer(px,py){
  const fx=px-60,fy=py+5;ctx.save();ctx.translate(fx,fy);
  ctx.fillStyle='#1565c0';ctx.beginPath();ctx.roundRect(-9,0,18,22,3);ctx.fill();
  ctx.fillStyle='#f4c2a1';ctx.beginPath();ctx.ellipse(0,-12,9,10,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#8d5524';ctx.beginPath();ctx.ellipse(0,-20,12,4,0,0,Math.PI*2);ctx.fill();ctx.fillRect(-7,-32,14,13);
  ctx.fillStyle='#6d3b13';ctx.beginPath();ctx.ellipse(0,-32,7,3,0,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=.7+Math.sin(Date.now()*.006)*.3;ctx.font='16px serif';ctx.textAlign='center';ctx.fillText('🧲',0,-42);
  ctx.restore();
}

function drawBoss(){
  const b=boss;if(!b)return;
  ctx.save();ctx.translate(b.x,b.y);
  const sc=1+Math.sin(b.t*2)*.03,pulse=b.angry?1.1:1;ctx.scale(sc*pulse,sc*pulse);
  ctx.beginPath();ctx.ellipse(0,45,38,10,0,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,.25)';ctx.fill();
  const bg=ctx.createRadialGradient(-10,-10,5,0,0,45);bg.addColorStop(0,b.angry?'#8B4500':'#6B3A2A');bg.addColorStop(1,b.angry?'#5a2d00':'#3D1F10');
  ctx.beginPath();ctx.ellipse(0,10,38,42,0,0,Math.PI*2);ctx.fillStyle=bg;ctx.fill();
  ctx.beginPath();ctx.ellipse(0,15,22,26,0,0,Math.PI*2);ctx.fillStyle=b.angry?'#c47a40':'#a0522d';ctx.fill();
  const arm=Math.sin(b.t*3)*12;
  ctx.fillStyle=b.angry?'#7a3800':'#5a2d00';ctx.beginPath();ctx.ellipse(-42,5+arm,16,12,.3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(42,5-arm,16,12,-.3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#4a2510';ctx.beginPath();ctx.ellipse(-20,46,14,10,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(20,46,14,10,0,0,Math.PI*2);ctx.fill();
  const hg2=ctx.createRadialGradient(-5,-40,4,0,-38,28);hg2.addColorStop(0,b.angry?'#8B4500':'#6B3A2A');hg2.addColorStop(1,b.angry?'#5a2d00':'#3D1F10');
  ctx.beginPath();ctx.ellipse(0,-38,28,26,0,0,Math.PI*2);ctx.fillStyle=hg2;ctx.fill();
  ctx.fillStyle=b.angry?'#7a3800':'#5a2d00';ctx.beginPath();ctx.arc(-22,-58,12,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(22,-58,12,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#c47a40';ctx.beginPath();ctx.arc(-22,-58,7,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(22,-58,7,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(0,-30,16,12,0,0,Math.PI*2);ctx.fillStyle='#a0522d';ctx.fill();
  ctx.beginPath();ctx.ellipse(0,-25,7,5,0,0,Math.PI*2);ctx.fillStyle='#222';ctx.fill();
  ctx.fillStyle=b.angry?'#ff2200':'#220000';ctx.beginPath();ctx.ellipse(-11,-42,5,5,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(11,-42,5,5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-9,-43,2,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(13,-43,2,0,Math.PI*2);ctx.fill();
  if(b.angry){ctx.strokeStyle='#ff2200';ctx.lineWidth=3;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(-16,-48);ctx.lineTo(-6,-44);ctx.stroke();ctx.beginPath();ctx.moveTo(16,-48);ctx.lineTo(6,-44);ctx.stroke();}
  ctx.save();ctx.translate(48,20+arm);ctx.rotate(.3);ctx.fillStyle='#e0900a';ctx.beginPath();ctx.roundRect(-8,-10,16,20,4);ctx.fill();ctx.font='12px serif';ctx.textAlign='center';ctx.fillText('🍯',0,4);ctx.restore();
  const hpPct=bossHp/bossMaxHp;
  ctx.fillStyle='rgba(0,0,0,.4)';ctx.beginPath();ctx.roundRect(-30,-80,60,8,4);ctx.fill();
  ctx.fillStyle=hpPct>.5?'#44ff44':hpPct>.25?'#ffaa00':'#ff3333';ctx.beginPath();ctx.roundRect(-30,-80,60*hpPct,8,4);ctx.fill();
  ctx.restore();
}

// ── Input ─────────────────────────────────────────────────────
function inp(cx,cy){if(GS!=='play')return;const g=toGame(cx,cy);PL.tx=g.x;PL.ty=g.y;}
gc.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];inp(t.clientX,t.clientY);},{passive:false});
gc.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0];inp(t.clientX,t.clientY);},{passive:false});
gc.addEventListener('mousedown',e=>inp(e.clientX,e.clientY));
gc.addEventListener('mousemove',e=>{if(e.buttons)inp(e.clientX,e.clientY);});

// ── Flow ──────────────────────────────────────────────────────
function startGame(){
  LI=0;score=0;lives=3;curWep=0;beesKilled=0;totalFruit=0;
  showScr(null);hide('ss');show('hud');show('cbar');show('pb');show('mb');show('wepbar');show('timerbar');
  startLv();
}
function startLv(){
  GS='play';inv=false;invT=0;combo=0;comboT=0;shots=[];wepCd=0;buildLv();updHUD();updWepBar();
  const lvNames=['Sunny Garden','Apple Orchard','Rainy Garden','Nighttime Garden','The Big Beehive!'];
  $('lntlvl').textContent='LEVEL '+(LI+1);$('lntnm').textContent=lvNames[LI]||'';toast('lnt',2200);
  last=performance.now();
  startBuzz();startMusic(LI);
  if(!introAudio.paused){let vol=introAudio.volume;const fade=setInterval(()=>{vol=Math.max(0,vol-0.05);introAudio.volume=vol;if(vol<=0){clearInterval(fade);stopIntro();}},100);}
}
$('stbtn').addEventListener('click',()=>{resumeAC();startIntro();startGame();});
$('nxbtn').addEventListener('click',()=>{LI++;if(LI>=LVS.length){stopBuzz();stopMusic();$('wsub').textContent='Total score: ⭐ '+score+' — Riley is a garden superstar! 🌟';sfx('win');showScr('ws');}else{showScr(null);startLv();}});
$('rtbtn').addEventListener('click',()=>{lives=3;showScr(null);startLv();});
$('h1btn').addEventListener('click',home);$('pabtn').addEventListener('click',()=>{startGame();});
$('pb').addEventListener('click',()=>{if(GS==='play'){GS='pause';stopBuzz();stopMusic();showScr('ps');}});
$('rsbtn').addEventListener('click',()=>{showScr(null);last=performance.now();GS='play';startBuzz();startMusic(LI);});
$('h2btn').addEventListener('click',home);
$('mb').addEventListener('click',()=>{muted=!muted;$('mb').textContent=muted?'🔇':'🔊';if(muted){stopBuzz();stopMusic();stopIntro();}else if(GS==='play'){startBuzz();startMusic(LI);}});
function home(){
  GS='start';stopBuzz();stopMusic();stopIntro();
  hide('hud');hide('cbar');hide('pb');hide('mb');hide('wepbar');hide('timerbar');
  showScr('ss');ctx.setTransform(1,0,0,1,0,0);ctx.clearRect(0,0,gc.width,gc.height);
}

// ── Title screen loop ─────────────────────────────────────────
function titleLoop(ts){
  if(GS!=='start'){raf=requestAnimationFrame(mainLoop);return;}
  scaleCtx();
  const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#ff6b9d');g.addColorStop(.5,'#ff9a3c');g.addColorStop(1,'#ffe066');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  const t2=ts*.001;
  ctx.globalAlpha=.25;
  for(let i=0;i<6;i++){ctx.beginPath();ctx.arc(50+i*90+Math.sin(t2+i)*20,H*.35+Math.cos(t2*.7+i)*30,28+Math.sin(t2+i*2)*8,0,Math.PI*2);ctx.fillStyle=['#fff','#ffe0f0','#ffd4e8'][i%3];ctx.fill();}
  ctx.globalAlpha=1;
  ctx.fillStyle='rgba(0,0,0,.15)';ctx.font='bold 52px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText("Riley's",W/2+3,H*.3+3);ctx.fillText("Garden!",W/2+3,H*.3+58+3);
  ctx.fillStyle='#fff';ctx.fillText("Riley's",W/2,H*.3);ctx.fillText("Garden!",W/2,H*.3+58);
  const pulse=.92+.08*Math.sin(t2*3);
  ctx.save();ctx.translate(W/2,H*.72);ctx.scale(pulse,pulse);
  ctx.fillStyle='rgba(255,77,138,.95)';ctx.beginPath();ctx.roundRect(-90,-24,180,48,24);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 20px Arial';ctx.fillText('🌸  TAP TO PLAY  🌸',0,1);
  ctx.restore();
  ctx.fillStyle='rgba(255,255,255,.65)';ctx.font='bold 12px Arial';ctx.fillText("Collect fruit & blast baddies! Auto-weapons! 🌈✨💚",W/2,H*.52);
  ctx.fillStyle='rgba(255,255,255,.45)';ctx.font='bold 11px Arial';ctx.fillText('🎮 Built by Riley',W/2,H*.9);
  raf=requestAnimationFrame(titleLoop);
}
function mainLoop(ts){
  if(GS==='start'){raf=requestAnimationFrame(titleLoop);return;}
  last=ts;raf=requestAnimationFrame(loop);loop(ts);
}

raf=requestAnimationFrame(titleLoop);

if(ctx.roundRect===undefined){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    if(typeof r==='number')r=[r,r,r,r];else if(!Array.isArray(r)||!r.length)r=[0,0,0,0];
    while(r.length<4)r.push(r[r.length-1]);
    this.moveTo(x+r[0],y);this.lineTo(x+w-r[1],y);this.arcTo(x+w,y,x+w,y+r[1],r[1]);
    this.lineTo(x+w,y+h-r[2]);this.arcTo(x+w,y+h,x+w-r[2],y+h,r[2]);
    this.lineTo(x+r[3],y+h);this.arcTo(x,y+h,x,y+h-r[3],r[3]);
    this.lineTo(x,y+r[0]);this.arcTo(x,y,x+r[0],y,r[0]);this.closePath();return this;
  };
}
